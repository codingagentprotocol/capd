<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>CAP Web Client</title>
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; max-width:1180px; margin:24px auto; padding:0 16px; }
  h1 { font-size:18px; } h1 .v { color:#3fb950; font-size:12px; margin-left:8px; }
  #bar { display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  select, input, button { background:#161b22; color:#c9d1d9; border:1px solid #30363d; border-radius:6px; padding:6px 10px; font:inherit; }
  input#prompt { flex:1; }
  button { cursor:pointer; } button:hover { border-color:#58a6ff; }
  button:disabled { cursor:not-allowed; opacity:.55; }
  #accounts { display:flex; gap:8px; margin:12px 0; overflow-x:auto; padding-bottom:2px; }
  .acct { min-width:220px; border:1px solid #30363d; border-radius:6px; padding:8px; background:#010409; }
  .acct.active { border-color:#3fb950; }
  .acct .name { color:#e6edf3; word-break:break-all; }
  .acct .provider { color:#58a6ff; font-size:12px; margin-top:2px; }
  .acct .quota { color:#8b949e; font-size:12px; margin:4px 0; }
  .acct button { padding:3px 8px; }
  #routePreview { color:#8b949e; font-size:12px; margin:-4px 0 10px; min-height:18px; }
  #readiness { color:#8b949e; font-size:12px; margin:-4px 0 10px; min-height:18px; }
  #readiness.ok { color:#3fb950; }
  #readiness.warn { color:#d29922; }
  #accountDiagnostics { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:8px; margin:0 0 12px; }
  .acctdiag { border:1px solid #30363d; border-radius:6px; padding:8px; background:#010409; font-size:12px; }
  .acctdiag.pass { border-color:#238636; }
  .acctdiag.fail { border-color:#8b5a12; }
  .acctdiag .head { color:#e6edf3; word-break:break-all; }
  .acctdiag .meta { color:#8b949e; margin-top:2px; }
  .acctdiag .bad { color:#f85149; }
  .acctdiag .good { color:#3fb950; }
  .acctdiag .next { color:#d29922; margin-top:4px; }
  #readinessChecks { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:6px; margin:-2px 0 12px; }
  .check { border:1px solid #30363d; border-radius:6px; padding:6px 8px; background:#010409; font-size:12px; }
  .check.pass { border-color:#238636; }
  .check.fail { border-color:#8b5a12; }
  .check .name { color:#e6edf3; }
  .check .evidence { color:#8b949e; margin-top:2px; }
  .check .next { color:#d29922; margin-top:2px; }
  #main { display:grid; grid-template-columns:minmax(220px, 300px) 1fr; gap:12px; align-items:stretch; }
  #sessions, #log { background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; height:520px; overflow-y:auto; }
  #log { white-space:pre-wrap; }
  #sessions { display:flex; flex-direction:column; gap:8px; }
  #sessionHead { display:flex; align-items:center; justify-content:space-between; gap:8px; color:#8b949e; font-size:12px; }
  #sessionHead button { padding:3px 8px; }
  .sess { border:1px solid #30363d; border-radius:6px; padding:8px; }
  .sess.active { border-color:#58a6ff; }
  .sess .id { color:#e6edf3; word-break:break-all; }
  .sess .meta { color:#8b949e; font-size:12px; margin:4px 0; }
  .sess button { padding:3px 8px; }
  .empty { color:#8b949e; font-size:12px; }
  .ev-text { color:#e6edf3; } .ev-tool { color:#d29922; } .ev-out { color:#8b949e; }
  .ev-done { color:#3fb950; } .ev-err { color:#f85149; } .ev-sys { color:#58a6ff; }
  .approval { background:#1c1207; border:1px solid #d29922; border-radius:6px; padding:8px; margin:6px 0; }
  .approval button { margin-right:6px; }
  #status { font-size:12px; color:#8b949e; }
  @media (max-width: 820px) { #main { grid-template-columns:1fr; } #sessions { height:220px; } }
</style>
</head>
<body>
<h1>CAP Web Client <span class="v" id="daemon"></span></h1>
<div id="status">connecting…</div>
<div id="bar">
  <select id="agent"></select>
  <select id="account"><option value="">不用账号</option><option value="auto">自动账号</option></select>
  <input id="cwd" list="cwds" placeholder="项目目录（留空=主目录）" style="flex:0 0 260px" />
  <datalist id="cwds"></datalist>
  <input id="prompt" placeholder="让 agent 干点什么…" />
  <label><input id="requireFreshQuota" type="checkbox" /> fresh quota</label>
  <button id="previewRoute">预览路由</button>
  <button id="refreshDiagnostic">刷新诊断</button>
  <button id="importCodex">导入 Codex</button>
  <button id="checkAccounts">检查账号</button>
  <button id="checkReady">就绪门禁</button>
  <label><input id="requireNativeSecret" type="checkbox" /> native secret</label>
  <button id="refreshSelectedQuota">刷新所选 quota</button>
  <button id="refreshAllQuota">刷新全部 quota</button>
  <button id="send">发送</button>
  <button id="cancel">中断</button>
</div>
<div id="accounts"></div>
<div id="routePreview"></div>
<div id="readiness">诊断等待连接…</div>
<div id="accountDiagnostics"></div>
<div id="readinessChecks"></div>
<div id="main">
  <div id="sessions">
    <div id="sessionHead"><span>Sessions</span><button id="refreshSessions">刷新</button></div>
    <div class="empty">暂无会话</div>
  </div>
  <div id="log"></div>
</div>

<script>
// token 来自 ~/.capd/token，通过 ?token=... 传入；WebSocket 握手用子协议 header 发送。
const params = new URLSearchParams(location.search);
const TOKEN = params.get("token") || "";
const CAPD = safeCAPDHost(params.get("capd"));
const QUOTA_FRESH_MS = 30 * 60 * 1000;
if (TOKEN) {
  const cleanURL = new URL(location.href);
  cleanURL.searchParams.delete("token");
  history.replaceState(null, "", cleanURL.pathname + cleanURL.search + cleanURL.hash);
}

const log = document.getElementById("log");
const sessionsEl = document.getElementById("sessions");
const accountsEl = document.getElementById("accounts");
const routePreviewEl = document.getElementById("routePreview");
const readinessEl = document.getElementById("readiness");
const accountDiagnosticsEl = document.getElementById("accountDiagnostics");
const readinessChecksEl = document.getElementById("readinessChecks");
const statusEl = document.getElementById("status");
let ws, nextId = 0, pending = {}, sessionId = null;
const RPC_TIMEOUT_MS = 12000;
const LONG_RPC_TIMEOUT_MS = 120000;

function rpcTimeoutFor(method, params = {}) {
  if (method === "accounts/quota" || method === "agents/usage") return LONG_RPC_TIMEOUT_MS;
  if (method === "accounts/check" && (params.refreshQuota || params.requireFreshQuota || params.requireAllFreshQuota || params.requireMultiple)) return LONG_RPC_TIMEOUT_MS;
  return RPC_TIMEOUT_MS;
}

function rejectAllPending(message) {
  const err = { message };
  for (const id of Object.keys(pending)) {
    clearTimeout(pending[id].timer);
    pending[id].reject(err);
    delete pending[id];
  }
}

function safeCAPDHost(raw) {
  const fallback = location.host || "127.0.0.1:7777";
  const candidate = (raw || fallback).trim();
  if (!candidate) return fallback;
  try {
    const u = new URL(`ws://${candidate}`);
    const host = u.hostname.toLowerCase();
    if (u.host === location.host || host === "localhost" || host === "127.0.0.1" || host === "[::1]") return u.host;
  } catch (_) {}
  return fallback;
}

function line(cls, text) {
  const el = document.createElement("div");
  el.className = cls; el.textContent = text;
  log.appendChild(el); log.scrollTop = log.scrollHeight;
  return el;
}

function call(method, p) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject({ message: "CAP WebSocket is not connected" });
      return;
    }
    const id = ++nextId;
    const timeoutMS = rpcTimeoutFor(method, p || {});
    const timer = setTimeout(() => {
      if (!pending[id]) return;
      delete pending[id];
      reject({ message: `${method} timeout after ${timeoutMS}ms` });
    }, timeoutMS);
    pending[id] = { resolve, reject, timer };
    try {
      ws.send(JSON.stringify({ jsonrpc: "2.0", id, method, params: p }));
    } catch (e) {
      clearTimeout(timer);
      delete pending[id];
      reject(e);
    }
  });
}

function rpcError(error) {
  const e = new Error(error.message || JSON.stringify(error));
  e.data = error.data;
  return e;
}

function onEvent(ev) {
  const d = ev.data || {};
  switch (ev.type) {
    case "session.started": line("ev-sys", `· 会话引擎就绪 (${d.nativeSessionId || ""})`); break;
    case "output.text":
      if (d.delta) { appendDelta(d.text); }
      else if (!d.final) { line("ev-text", d.text); }
      else { closeDelta(); }
      break;
    case "tool.use": line("ev-tool", `⏵ ${d.command || d.kind}`); break;
    case "tool.result": if (!d.delta && d.output) line("ev-out", String(d.output).trimEnd()); break;
    case "approval.needed": renderApproval(d); break;
    case "usage.updated": break;
    case "task.done": closeDelta(); line(d.ok ? "ev-done" : "ev-err", d.ok ? "✓ 完成" : "✗ 失败/取消"); break;
    case "error": line("ev-err", `✗ ${d.message}`); break;
  }
}

let deltaEl = null;
function appendDelta(t) {
  if (!deltaEl) deltaEl = line("ev-text", "");
  deltaEl.textContent += t; log.scrollTop = log.scrollHeight;
}
function closeDelta() { deltaEl = null; }

function renderApproval(d) {
  const box = document.createElement("div");
  box.className = "approval";
  box.textContent = `⚠ 请求批准 [${d.kind}] ${d.command || ""} `;
  for (const [label, decision] of [["允许", "approve"], ["总是允许", "approveAlways"], ["拒绝", "deny"]]) {
    const b = document.createElement("button");
    b.textContent = label;
    b.onclick = async () => {
      await call("approval/reply", { sessionId, approvalId: d.approvalId, decision });
      box.textContent = `⚠ ${d.command || d.kind} → ${label}`;
    };
    box.appendChild(b);
  }
  log.appendChild(box); log.scrollTop = log.scrollHeight;
}

function clearLog() {
  log.textContent = "";
  deltaEl = null;
}

async function loadSessions() {
  try {
    const { sessions } = await call("session/list", {});
    renderSessions(sessions || []);
    updateCwdOptions(sessions || []);
  } catch (e) {
    renderSessions([], "会话列表不可用");
  }
}

async function loadAccounts() {
  try {
    const [allResult, codexResult] = await Promise.all([
      call("accounts/list", {}),
      call("accounts/list", { provider: "codex" })
    ]);
    renderAccounts(allResult.accounts || [], codexResult.currentAccountId || "");
    await refreshReadinessDiagnostic();
  } catch (e) {
    accountsEl.textContent = "";
    routePreviewEl.textContent = "";
    readinessEl.className = "warn";
    readinessEl.textContent = "诊断不可用: accounts/list";
    line("ev-sys", "· accounts/list 不可用");
  }
}

async function importCodexAccount() {
  const authPath = prompt("Codex auth.json 路径（留空使用默认；多个路径用逗号分隔）", "");
  if (authPath === null) return;
  const button = document.getElementById("importCodex");
  button.disabled = true;
  try {
    const params = { provider: "codex" };
    const authPaths = authPath.split(",").map(p => p.trim()).filter(Boolean);
    if (authPaths.length === 1) params.authPath = authPaths[0];
    if (authPaths.length > 1) params.authPaths = authPaths;
    const result = await call("accounts/import", params);
    const imported = result.accounts && result.accounts.length ? result.accounts : [result.account].filter(Boolean);
    const labels = imported.map(a => a.email || a.id).join(", ");
    const total = result.importedAccounts || imported.length;
    line("ev-sys", `· 已导入 Codex 账号 ${labels || "unknown"}${imported.length > 1 ? ` (${imported.length})` : ""} · total ${total}`);
    const nextStep = accountsImportNextStep(total);
    if (nextStep) line("ev-sys", `· next ${nextStep}`);
    await loadAccounts();
  } catch (e) {
    line("ev-err", `✗ 导入 Codex 失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

function accountsImportNextStep(importedAccounts) {
  if (!importedAccounts) return "";
  if (importedAccounts < 2) return "继续导入第二个 Codex 账号";
  return "运行就绪门禁或 capd accounts check --readiness";
}

async function checkAccounts(readinessGate = false) {
  const button = document.getElementById(readinessGate ? "checkReady" : "checkAccounts");
  button.disabled = true;
  try {
    const params = { provider: "codex" };
    if (readinessGate) {
      params.refreshQuota = true;
      params.requireMultiple = true;
      params.requireFreshQuota = true;
      params.requireAllFreshQuota = true;
      if (document.getElementById("requireNativeSecret").checked) params.requireSecretBackend = "native";
    }
    const result = await call("accounts/check", params);
    const route = result.autoRoute ? ` · auto ${result.autoRoute.accountId || ""} ${routeEvidenceSummary(result.autoRoute)}` : "";
    if (readinessGate) line("ev-sys", `· readiness quota refreshed ${result.quotaRefreshed ? "yes" : "no"}`);
    line("ev-sys", `· 账号检查完成 ${result.checkedAccounts} 个${route}`);
    const evidence = accountCheckSummary(result.accounts || []);
    if (evidence) line("ev-sys", `· quota evidence ${evidence}`);
    renderAccountDiagnostics(result);
    await loadAccounts();
  } catch (e) {
    const label = readinessGate ? "就绪门禁失败" : "账号检查失败";
    line("ev-err", `✗ ${label}: ${e.message || JSON.stringify(e)}`);
    if (e.data) {
      const route = e.data.autoRoute ? ` · auto ${e.data.autoRoute.accountId || ""} ${routeEvidenceSummary(e.data.autoRoute)}` : "";
      line("ev-sys", `· partial evidence ${e.data.checkedAccounts || 0} 个${route}`);
      const evidence = accountCheckSummary(e.data.accounts || []);
      if (evidence) line("ev-sys", `· partial quota evidence ${evidence}`);
      renderAccountDiagnostics(e.data);
    }
  } finally {
    button.disabled = false;
  }
}

async function refreshReadinessDiagnostic() {
  readinessEl.className = "";
  readinessChecksEl.textContent = "";
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    readinessEl.textContent = "诊断等待连接…";
    return;
  }
  readinessEl.textContent = "诊断中…";
  try {
    await checkDaemonHealth(false);
    const checkParams = { provider: "codex" };
    if (document.getElementById("requireNativeSecret").checked) checkParams.requireSecretBackend = "native";
    const result = await call("accounts/check", checkParams);
    let route = null;
    let routeError = "";
    try {
      route = await call("agents/route", { accountId: "auto" });
    } catch (e) {
      routeError = e.message || JSON.stringify(e);
    }
    renderReadinessDiagnosticResult({ result, route, routeError, requireNativeSecret: document.getElementById("requireNativeSecret").checked });
  } catch (e) {
    if (e.data) {
      let route = null;
      let routeError = "";
      try {
        route = await call("agents/route", { accountId: "auto" });
      } catch (routeErr) {
        routeError = routeErr.message || JSON.stringify(routeErr);
      }
      renderReadinessDiagnosticResult({ result: e.data, route, routeError, readinessError: e.message || JSON.stringify(e), requireNativeSecret: document.getElementById("requireNativeSecret").checked });
      return;
    }
    readinessEl.className = "warn";
    readinessEl.textContent = "诊断不可用: " + (e.message || JSON.stringify(e));
    renderReadinessChecks([
      { name: "daemon/CAP diagnostic", ok: false, evidence: e.message || JSON.stringify(e), nextStep: "确认 capd start 正在运行，然后刷新诊断" }
    ]);
  }
}

function renderReadinessDiagnosticResult({ result, route, routeError = "", readinessError = "", requireNativeSecret = false }) {
  const accounts = result.accounts || [];
  const freshCount = accounts.filter(a => a.quotaFresh).length;
  const issues = [];
  if ((result.checkedAccounts || 0) < 2) issues.push("需要至少 2 个 Codex 账号");
  if (accounts.length && freshCount < accounts.length) issues.push("quota 未全部 fresh");
  const autoRoute = result.autoRoute || (route && route.accountRoute);
  if (!autoRoute || !autoRoute.fresh) issues.push("auto route 缺 fresh quota");
  if (requireNativeSecret && result.secretBackend !== "native") issues.push("native SecretStore 未启用");
  if (readinessError) issues.push("readiness gate failed");
  const checks = readinessCheckRows({ result, accounts, freshCount, autoRoute, route, routeError, readinessError, requireNativeSecret });
  const summary = readinessSummaryText({ result, accounts, freshCount, autoRoute, route, requireNativeSecret });
  const parts = [
    "daemon ok",
    summary,
    `codex ${result.checkedAccounts || 0}`,
    `secret ${result.secretBackend || "unknown"}`,
    `quota fresh ${freshCount}/${accounts.length}`
  ];
  const accountEvidence = accountCheckSummary(accounts);
  if (accountEvidence) parts.push(`accounts ${accountEvidence}`);
  if (autoRoute) parts.push(`auto ${autoRoute.accountId || (route && route.accountId) || "unknown"} ${routeEvidenceSummary(autoRoute)}`);
  if (route) parts.push(`route ${routeDecisionSummary(route)}`);
  const candidates = routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates));
  if (candidates) parts.push(`candidates ${candidates}`);
  if (readinessError) parts.push(`readiness error ${readinessError}`);
  if (routeError) parts.push(`route error ${routeError}`);
  readinessEl.className = issues.length ? "warn" : "ok";
  readinessEl.textContent = issues.length ? `${parts.join(" · ")} · ${issues.join(" · ")}` : `${parts.join(" · ")} · ready`;
  renderReadinessChecks(checks);
  renderAccountDiagnostics(result);
}

function readinessSummaryText({ result, accounts, freshCount, autoRoute, route, requireNativeSecret = false }) {
  const summary = result.summary || {};
  const checked = summary.checkedAccounts ?? result.checkedAccounts ?? 0;
  const required = summary.requiredAccounts || 2;
  const missing = summary.missingAccounts ?? Math.max(0, required - checked);
  const stale = summary.staleQuotaAccounts ?? accounts.filter(a => a.quotaState === "stale").length;
  const missingQuota = summary.missingQuotaAccounts ?? accounts.filter(a => !a.quotaState || a.quotaState === "missing").length;
  const fresh = summary.freshQuotaAccounts ?? freshCount;
  const secretBackend = summary.secretBackend || result.secretBackend || "unknown";
  const routeOK = !!(route && route.accountRoute);
  const secretOK = typeof summary.secretBackendOk === "boolean" ? summary.secretBackendOk : (!requireNativeSecret || secretBackend === "native");
  const autoFresh = typeof summary.autoRouteFresh === "boolean" ? summary.autoRouteFresh : !!(autoRoute && autoRoute.fresh);
  const ready = missing === 0 && checked > 0 && fresh === checked && autoFresh && routeOK && secretOK;
  return `summary ready ${ready} accounts ${checked}/${required} missing ${missing} quota fresh ${fresh} stale ${stale} missing quota ${missingQuota} auto fresh ${autoFresh} route decision ${routeOK} secret ok ${secretOK}`;
}

function readinessCheckRows({ result, accounts, freshCount, autoRoute, route, routeError, readinessError = "", requireNativeSecret = false }) {
  const checked = result.checkedAccounts || 0;
  const secretBackend = result.secretBackend || "unknown";
  const secretOK = !requireNativeSecret || secretBackend === "native";
  const secretNextStep = !secretOK ? "restart daemon with: capd start --secret-backend native" : "deep verify with: capd doctor --json --fail --verify-secretstore --require-secret-backend native";
  return [
    { name: "daemon health", ok: true, evidence: "health ok", nextStep: "" },
    { name: "Codex multi-account import", ok: checked >= 2, evidence: `checked ${checked}, need 2`, nextStep: checked >= 2 ? "" : "导入至少两个账号: capd accounts import --auth /path/a --auth /path/b" },
    { name: "Codex quota freshness", ok: accounts.length > 0 && freshCount === accounts.length, evidence: `fresh ${freshCount}/${accounts.length}`, nextStep: accounts.length > 0 && freshCount === accounts.length ? "" : "运行就绪门禁或 capd accounts check --readiness" },
    { name: "Codex auto route freshness", ok: !!(autoRoute && autoRoute.fresh), evidence: autoRoute ? routeEvidenceSummary(autoRoute) : "auto route missing", nextStep: autoRoute && autoRoute.fresh ? "" : "刷新 quota 后预览自动路由" },
    { name: "readiness gate", ok: !readinessError, evidence: readinessError || "no blocking readiness error", nextStep: readinessError ? "按 partial evidence 修复账号、quota 或 SecretStore 后重跑就绪门禁" : "" },
    { name: "route decision", ok: !!route, evidence: route ? routeDecisionSummary(route) : routeError || "route missing", nextStep: route ? "" : "运行 capd agents route --account auto" },
    { name: "route candidates", ok: !!routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates)), evidence: routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates)) || "no routeCandidates evidence", nextStep: routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates)) ? "" : "刷新诊断或运行 capd agents route --account auto --json" },
    { name: "SecretStore backend", ok: secretOK, evidence: requireNativeSecret ? `secret ${secretBackend}, want native` : `secret ${secretBackend}`, nextStep: requireNativeSecret ? secretNextStep : "" }
  ];
}

function renderReadinessChecks(checks) {
  readinessChecksEl.textContent = "";
  for (const check of checks) {
    const box = document.createElement("div");
    box.className = "check " + (check.ok ? "pass" : "fail");
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = `${check.ok ? "pass" : "fail"} · ${check.name}`;
    const evidence = document.createElement("div");
    evidence.className = "evidence";
    evidence.textContent = check.evidence || "";
    box.append(name, evidence);
    if (check.nextStep) {
      const next = document.createElement("div");
      next.className = "next";
      next.textContent = check.nextStep;
      box.appendChild(next);
    }
    readinessChecksEl.appendChild(box);
  }
}

function renderAccountDiagnostics(result) {
  accountDiagnosticsEl.textContent = "";
  if (!result) return;
  const summary = result.summary || {};
  const header = document.createElement("div");
  header.className = "acctdiag " + (summary.ready ? "pass" : "fail");
  const title = document.createElement("div");
  title.className = "head";
  title.textContent = `accounts/check · ${result.checkedAccounts || 0} checked · ${summary.ready ? "ready" : "not ready"}`;
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = accountDiagnosticSummary(result);
  header.append(title, meta);
  if (!summary.ready) {
    const next = document.createElement("div");
    next.className = "next";
    next.textContent = accountDiagnosticNextStep(result);
    header.appendChild(next);
  }
  accountDiagnosticsEl.appendChild(header);
  const accounts = result.accounts || [];
  for (const account of accounts) accountDiagnosticsEl.appendChild(accountDiagnosticCard(account));
  if (accounts.length === 0 && (result.checkedAccounts || 0) > 0) {
    const empty = document.createElement("div");
    empty.className = "acctdiag fail";
    empty.textContent = "accounts/check failed before per-account evidence was available";
    accountDiagnosticsEl.appendChild(empty);
  }
}

function accountDiagnosticSummary(result) {
  const summary = result.summary || {};
  const parts = [
    `secret ${result.secretBackend || summary.secretBackend || "unknown"}`,
    `quota refreshed ${result.quotaRefreshed ? "yes" : "no"}`,
    `fresh ${summary.freshQuotaAccounts ?? 0}/${result.checkedAccounts || 0}`,
    `stale ${summary.staleQuotaAccounts ?? 0}`,
    `missing quota ${summary.missingQuotaAccounts ?? 0}`
  ];
  if (summary.requiredSecretBackend) parts.push(`required secret ${summary.requiredSecretBackend}`);
  if (result.autoRoute) parts.push(`auto ${result.autoRoute.accountId || "unknown"} ${routeEvidenceSummary(result.autoRoute)}`);
  return parts.join(" · ");
}

function accountDiagnosticCard(account) {
  const ok = account.secretBackendOk && account.credentialReadable && account.runtimeReady && account.quotaFresh;
  const card = document.createElement("div");
  card.className = "acctdiag " + (ok ? "pass" : "fail");
  const head = document.createElement("div");
  head.className = "head";
  head.textContent = `${account.current ? "* " : ""}${account.email || account.id || "unknown"}`;
  const secret = document.createElement("div");
  secret.className = account.secretBackendOk && account.credentialReadable ? "meta good" : "meta bad";
  secret.textContent = `secret ${account.secretState || "unknown"} · backend ${boolWord(account.secretBackendOk)} · readable ${boolWord(account.credentialReadable)}`;
  const runtime = document.createElement("div");
  runtime.className = account.runtimeReady ? "meta good" : "meta bad";
  runtime.textContent = `runtime ${boolWord(account.runtimeReady)} · auth ${boolWord(account.authJsonPrivate)} · marker ${boolWord(account.projectionMarkerOk)}`;
  const quota = document.createElement("div");
  quota.className = account.quotaFresh ? "meta good" : "meta bad";
  quota.textContent = accountQuotaDiagnosticText(account);
  card.append(head, secret, runtime, quota);
  const next = accountDiagnosticIssue(account);
  if (next) {
    const el = document.createElement("div");
    el.className = "next";
    el.textContent = next;
    card.appendChild(el);
  }
  return card;
}

function accountQuotaDiagnosticText(account) {
  const parts = [`quota ${account.quotaState || "missing"}`, account.quotaFresh ? "fresh" : "not-fresh"];
  if (hasNumber(account.primaryUsedPercent)) parts.push(`primary ${account.primaryUsedPercent}%`);
  if (account.quotaCheckedAt) parts.push(`checked ${new Date(account.quotaCheckedAt * 1000).toLocaleString()}`);
  return parts.join(" · ");
}

function accountDiagnosticIssue(account) {
  if (!account.secretBackendOk) return `secret backend ${account.secretState || "not ready"}; align CAPD_SECRET_BACKEND or re-import account`;
  if (!account.credentialReadable) return `credential ${account.secretState || "unreadable"}; unlock SecretStore or re-import account`;
  if (!account.runtimeReady) return "project account runtime with 准备运行 or rerun accounts/check";
  if (!account.quotaFresh) return "refresh quota for this account or run 就绪门禁";
  return "";
}

function accountDiagnosticNextStep(result) {
  const accounts = result.accounts || [];
  const summary = result.summary || {};
  if ((result.checkedAccounts || 0) < 2) return "import a second Codex account, then run 就绪门禁";
  if (summary.requiredSecretBackend && !summary.secretBackendOk) return `restart daemon with capd start --secret-backend ${summary.requiredSecretBackend}`;
  if (accounts.some(a => !a.secretBackendOk || !a.credentialReadable)) return "fix SecretStore access or re-import failing accounts";
  if (accounts.some(a => !a.runtimeReady)) return "project each failing account runtime, then rerun accounts/check";
  if (accounts.some(a => !a.quotaFresh)) return "refresh quota for all accounts";
  return "rerun 就绪门禁 after fixing the failed check";
}

function boolWord(value) {
  return value ? "ok" : "fail";
}

function accountCheckSummary(accounts) {
  return accounts.map(a => {
    const parts = [a.id || "unknown", a.quotaState || "missing"];
    if (a.secretState) parts.push(`secret ${a.secretState}`);
    if (typeof a.quotaFresh === "boolean") parts.push(a.quotaFresh ? "fresh" : "not-fresh");
    if (hasNumber(a.primaryUsedPercent)) parts.push(`primary ${a.primaryUsedPercent}%`);
    if (a.quotaCheckedAt) parts.push(`checked ${new Date(a.quotaCheckedAt * 1000).toLocaleString()}`);
    return parts.join(" ");
  }).join(" · ");
}

function renderAccounts(accounts, currentAccountId) {
  accountsEl.textContent = "";
  const accountSel = document.getElementById("account");
  const selected = accountSel.value;
  let codexAccounts = 0;
  accountSel.textContent = "";
  accountSel.appendChild(new Option("不用账号", ""));
  const autoOption = new Option("自动账号", "auto");
  if (selected === "auto") autoOption.selected = true;
  accountSel.appendChild(autoOption);
  for (const a of accounts) {
    const isCodex = a.provider === "codex";
    if (isCodex) {
      codexAccounts += 1;
      const option = new Option(accountLabel(a), a.id);
      if ((selected && a.id === selected) || (!selected && a.id === currentAccountId)) option.selected = true;
      accountSel.appendChild(option);
    }

    const card = document.createElement("div");
    card.className = "acct" + (isCodex && a.id === accountSel.value ? " active" : "");
    card.dataset.accountId = a.id;
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = a.email || a.id;
    const provider = document.createElement("div");
    provider.className = "provider";
    provider.textContent = a.provider || "unknown";
    const quota = document.createElement("div");
    quota.className = "quota";
    quota.textContent = quotaLabel(a);
    card.append(name, provider, quota);
    if (isCodex) {
      const current = document.createElement("button");
      current.textContent = "设为当前";
      current.disabled = a.id === currentAccountId;
      current.onclick = () => setCurrentAccount(a.id, current);
      const project = document.createElement("button");
      project.textContent = "准备运行";
      project.onclick = () => projectAccount(a.id, project);
      const refresh = document.createElement("button");
      refresh.textContent = "刷新 quota";
      refresh.onclick = () => refreshQuota(a.id, refresh);
      const remove = document.createElement("button");
      remove.textContent = "移除";
      remove.onclick = () => removeAccount(a.id, remove);
      card.append(current, project, refresh, remove);
    }
    accountsEl.appendChild(card);
  }
  if (accounts.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "暂无账号，先导入 Codex";
    accountsEl.appendChild(empty);
  } else if (codexAccounts === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "暂无 Codex 账号，先导入 Codex";
    accountsEl.appendChild(empty);
  }
  markActiveAccount();
  previewRoute();
}

function markActiveAccount() {
  const selected = document.getElementById("account").value;
  for (const card of accountsEl.querySelectorAll(".acct")) card.classList.remove("active");
  if (!selected || selected === "auto") return;
  for (const card of accountsEl.querySelectorAll(".acct")) {
    if (card.dataset.accountId === selected) card.classList.add("active");
  }
}

async function previewRoute() {
  routePreviewEl.textContent = "";
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const accountId = document.getElementById("account").value;
  const params = {};
  if (accountId) params.accountId = accountId;
  if (accountId === "auto" && document.getElementById("requireFreshQuota").checked) params.requireFreshQuota = true;
  try {
    const routed = await call("agents/route", params);
    routePreviewEl.textContent = routeDecisionSummary(routed);
  } catch (e) {
    routePreviewEl.textContent = "路由不可用: " + (e.message || JSON.stringify(e));
  }
}

function routeDecisionSummary(routed) {
  const agent = routed.agent || {};
  const parts = [`agent ${agent.id || "unknown"}`];
  if (routed.accountId) parts.push(`account ${routed.accountId}`);
  if (routed.accountRoute) parts.push(routeEvidenceSummary(routed.accountRoute));
  const candidates = routeCandidateSummary(routed.routeCandidates);
  if (candidates) parts.push(`candidates ${candidates}`);
  if (routed.reason) parts.push(routed.reason);
  return parts.join(" · ");
}

function routeCandidateSummary(candidates) {
  if (!Array.isArray(candidates) || candidates.length === 0) return "";
  return candidates.map(c => `${c.accountId || "unknown"} ${routeEvidenceSummary(c)}`).join(" | ");
}

function routeEvidenceSummary(route) {
  const parts = [`quota ${route.quotaState || "missing"}`];
  if (typeof route.fresh === "boolean") parts.push(route.fresh ? "fresh" : "not-fresh");
  if (hasNumber(route.primaryUsedPercent)) parts.push(`primary ${route.primaryUsedPercent}%`);
  if (hasNumber(route.score)) parts.push(`score ${route.score}`);
  if (route.checkedAt) parts.push(`checked ${new Date(route.checkedAt * 1000).toLocaleString()}`);
  return parts.join(" ");
}

function accountLabel(a) {
  const state = quotaState(a.quota);
  const quota = hasNumber(a.quota && a.quota.primaryUsedPercent) ? ` · ${a.quota.primaryUsedPercent}% ${state}` : ` · ${state}`;
  return `${a.provider || "unknown"} · ${a.email || a.id}${a.plan ? " · " + a.plan : ""}${quota}`;
}

function quotaLabel(a) {
  const state = quotaState(a.quota);
  if (!a.quota) return `${a.plan || "unknown plan"} · quota ${state}`;
  const parts = [];
  if (a.quota.plan || a.plan) parts.push(a.quota.plan || a.plan);
  parts.push(`quota ${state}`);
  if (hasNumber(a.quota.primaryUsedPercent)) parts.push(`primary ${a.quota.primaryUsedPercent}%`);
  if (hasNumber(a.quota.secondaryUsedPercent)) parts.push(`secondary ${a.quota.secondaryUsedPercent}%`);
  if (hasNumber(a.quota.codeReviewUsedPercent)) parts.push(`review ${a.quota.codeReviewUsedPercent}%`);
  if (a.quota.checkedAt) parts.push(`checked ${new Date(a.quota.checkedAt * 1000).toLocaleString()}`);
  return parts.join(" · ") || "quota 已缓存";
}

function quotaState(q) {
  if (q && q.quotaState) return q.quotaState;
  if (!q || !q.checkedAt) return "missing";
  return quotaFresh(q) ? "fresh" : "stale";
}

function quotaFresh(q) {
  return !!(q && q.checkedAt && Date.now() - q.checkedAt * 1000 <= QUOTA_FRESH_MS);
}

function hasNumber(v) {
  return typeof v === "number" && Number.isFinite(v);
}

function capdWebSocketURL() {
  const u = new URL(`ws://${CAPD}/ws`);
  return u.toString();
}

function webSocketAuthProtocol(token) {
  const bytes = new TextEncoder().encode(token);
  let binary = "";
  for (const b of bytes) binary += String.fromCharCode(b);
  return "capd.auth." + btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function capdHTTPURL(path) {
  const u = new URL(`http://${CAPD}${path}`);
  return u.toString();
}

async function checkDaemonHealth(updateStatus = true) {
  if (updateStatus) statusEl.textContent = "检查 daemon health…";
  const res = await fetch(capdHTTPURL("/healthz?format=json"), { cache: "no-store" });
  const body = (await res.text()).trim();
  if (!res.ok) throw new Error(`CAP health failed: ${res.status} ${body || "empty"}`);
  try {
    const info = JSON.parse(body);
    if (!info.ok) throw new Error("health ok=false");
    return info;
  } catch (err) {
    if (body !== "ok") throw new Error(`CAP health failed: invalid JSON ${body || "empty"}`);
    return { ok: true };
  }
}

async function refreshQuota(accountId, button) {
  button.disabled = true;
  try {
    const { account } = await call("accounts/quota", { provider: "codex", accountId });
    line("ev-sys", `· quota 已刷新 ${account.email || account.id}`);
    await loadAccounts();
  } catch (e) {
    line("ev-err", `✗ quota 刷新失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

async function setCurrentAccount(accountId, button) {
  button.disabled = true;
  try {
    const { account } = await call("accounts/current", { provider: "codex", accountId });
    line("ev-sys", `· 当前账号 ${account.email || account.id}`);
    await loadAccounts();
  } catch (e) {
    line("ev-err", `✗ 设置当前账号失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

async function projectAccount(accountId, button) {
  button.disabled = true;
  try {
    const result = await call("accounts/project", { provider: "codex", accountId });
    line("ev-sys", `· 运行环境已准备 ${result.accountId}`);
  } catch (e) {
    line("ev-err", `✗ 准备运行环境失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

async function removeAccount(accountId, button) {
  if (!confirm(`移除账号 ${accountId}？`)) return;
  button.disabled = true;
  try {
    const removed = await call("accounts/remove", { provider: "codex", accountId });
    line("ev-sys", `· 已移除账号 ${removed.accountId}`);
    const accountSel = document.getElementById("account");
    if (accountSel.value === accountId) accountSel.value = removed.currentAccountId || "";
    await loadAccounts();
  } catch (e) {
    line("ev-err", `✗ 移除账号失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

async function refreshSelectedQuota() {
  const button = document.getElementById("refreshSelectedQuota");
  const accountId = document.getElementById("account").value;
  if (!accountId) {
    line("ev-err", "✗ 请选择 Codex 账号或自动账号");
    return;
  }
  await refreshQuota(accountId, button);
}

async function refreshAllQuota() {
  const button = document.getElementById("refreshAllQuota");
  button.disabled = true;
  try {
    const result = await call("accounts/quota", { provider: "codex", accountId: "all" });
    const refreshed = result.accounts || [];
    if (!refreshed.length) {
      line("ev-err", "✗ 没有可刷新的 Codex 账号");
      return;
    }
    line("ev-sys", `· quota 批量刷新完成 ${refreshed.length}/${refreshed.length}`);
    await loadAccounts();
  } catch (e) {
    line("ev-err", `✗ quota 批量刷新失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

function updateCwdOptions(sessions) {
  const dirs = [...new Set((sessions || []).map(s => s.cwd).filter(Boolean))];
  const dl = document.getElementById("cwds");
  dl.textContent = "";
  for (const d of dirs) {
    const o = document.createElement("option");
    o.value = d; dl.appendChild(o);
  }
}

function renderSessions(sessions, emptyText = "暂无会话") {
  sessionsEl.textContent = "";
  const head = document.createElement("div");
  head.id = "sessionHead";
  const title = document.createElement("span");
  title.textContent = `Sessions (${sessions.length})`;
  const refresh = document.createElement("button");
  refresh.textContent = "刷新";
  refresh.onclick = loadSessions;
  head.append(title, refresh);
  sessionsEl.appendChild(head);
  if (!sessions.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = emptyText;
    sessionsEl.appendChild(empty);
    return;
  }
  for (const s of sessions) {
    const box = document.createElement("div");
    box.className = "sess" + (s.sessionId === sessionId ? " active" : "");
    const id = document.createElement("div");
    id.className = "id";
    id.textContent = s.sessionId;
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `${s.agentId}${s.accountId ? " · " + s.accountId : ""} · ${s.state}${s.cwd ? " · " + s.cwd : ""}`;
    const attach = document.createElement("button");
    attach.textContent = "接管";
    attach.disabled = s.state === "ended";
    attach.onclick = () => attachSession(s.sessionId, true);
    box.append(id, meta, attach);
    sessionsEl.appendChild(box);
  }
}

async function attachSession(id, replay) {
  sessionId = id;
  clearLog();
  await call("session/attach", { sessionId, fromSeq: replay ? 0 : Number.MAX_SAFE_INTEGER });
  line("ev-sys", `· 已接管 ${sessionId}`);
  await loadSessions();
}

async function connect() {
  const health = await checkDaemonHealth();
  ws = new WebSocket(capdWebSocketURL(), [webSocketAuthProtocol(TOKEN)]);
  ws.onmessage = (m) => {
    const msg = JSON.parse(m.data);
    if (msg.method === "event") { onEvent(msg.params); return; }
    const p = pending[msg.id];
    if (p) {
      delete pending[msg.id];
      clearTimeout(p.timer);
      msg.error ? p.reject(rpcError(msg.error)) : p.resolve(msg.result);
    }
  };
  ws.onclose = () => {
    statusEl.textContent = "连接断开";
    rejectAllPending("CAP WebSocket closed");
  };
  await new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error("CAP WebSocket connect timeout")), 10000);
    ws.onopen = () => { clearTimeout(timer); resolve(); };
    ws.onerror = () => { clearTimeout(timer); reject(new Error("CAP WebSocket error")); };
  });
  ws.onerror = () => {
    statusEl.textContent = "连接错误";
    rejectAllPending("CAP WebSocket error");
  };

  const init = await call("initialize", { protocolVersion: "0.1", client: { name: "cap-web-demo" } });
  const healthMeta = [
    health.version || (init.daemon && init.daemon.version),
    `protocol ${health.protocolVersion || init.protocolVersion}`,
    health.secretBackend ? `secret ${health.secretBackend}` : ""
  ].filter(Boolean).join(" · ");
  document.getElementById("daemon").textContent = `${(init.daemon && init.daemon.name) || health.daemon || "capd"} ${healthMeta}`;
  statusEl.textContent = "已连接 · health ok";

  const { agents } = await call("agents/list", {});
  const sel = document.getElementById("agent");
  for (const a of agents.filter(a => a.available)) {
    const o = document.createElement("option");
    o.value = a.id; o.textContent = `${a.id} (${a.version || "?"})`;
    sel.appendChild(o);
  }

  await loadAccounts();
  await loadSessions();
}

document.getElementById("send").onclick = async () => {
  try {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) return;
    document.getElementById("prompt").value = "";
    if (!sessionId) {
      const cwd = document.getElementById("cwd").value.trim();
      const accountId = document.getElementById("account").value;
      const create = { agentId: document.getElementById("agent").value, cwd };
      if (accountId) create.accountId = accountId;
      if (accountId === "auto" && document.getElementById("requireFreshQuota").checked) create.requireFreshQuota = true;
      const res = await call("session/create", create);
      sessionId = res.sessionId;
      const accountEvidence = res.accountId ? ` · account ${res.accountId}` : "";
      line("ev-sys", `· 新会话 ${sessionId}${accountEvidence} @ ${cwd || "~"}`);
      await loadSessions();
    }
    line("ev-sys", `» ${prompt}`);
    await call("task/send", { sessionId, prompt });
  } catch (e) {
    line("ev-err", `✗ 发送失败: ${e.message || JSON.stringify(e)}`);
  }
};
document.getElementById("cancel").onclick = () => sessionId && call("task/cancel", { sessionId });
document.getElementById("refreshSessions").onclick = loadSessions;
document.getElementById("previewRoute").onclick = previewRoute;
document.getElementById("refreshDiagnostic").onclick = refreshReadinessDiagnostic;
document.getElementById("importCodex").onclick = importCodexAccount;
document.getElementById("checkAccounts").onclick = () => checkAccounts(false);
document.getElementById("checkReady").onclick = () => checkAccounts(true);
document.getElementById("refreshSelectedQuota").onclick = refreshSelectedQuota;
document.getElementById("refreshAllQuota").onclick = refreshAllQuota;
document.getElementById("account").onchange = () => { markActiveAccount(); previewRoute(); };
document.getElementById("requireFreshQuota").onchange = previewRoute;
document.getElementById("prompt").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("send").click(); });

connect().catch(e => { statusEl.textContent = "连接失败: " + (e.message || JSON.stringify(e)); });
</script>
