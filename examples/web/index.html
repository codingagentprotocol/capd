<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>CAP Web Client</title>
<style>
  :root { color-scheme: dark; }
  body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; background:#0d1117; color:#c9d1d9; max-width:1180px; margin:24px auto; padding:0 16px; }
  h1 { font-size:18px; } h1 .v { color:#3fb950; font-size:12px; margin-left:8px; }
  #bar { display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  select, input, button { background:#161b22; color:#c9d1d9; border:1px solid #30363d; border-radius:6px; padding:6px 10px; font:inherit; }
  input#prompt { flex:1; }
  button { cursor:pointer; } button:hover { border-color:#58a6ff; }
  button:disabled { cursor:not-allowed; opacity:.55; }
  #accounts { display:flex; gap:8px; margin:12px 0; overflow-x:auto; padding-bottom:2px; }
  .acct { min-width:220px; border:1px solid #30363d; border-radius:6px; padding:8px; background:#010409; }
  .acct.active { border-color:#3fb950; }
  .acct .name { color:#e6edf3; word-break:break-all; }
  .acct .provider { color:#58a6ff; font-size:12px; margin-top:2px; }
  .acct .quota { color:#8b949e; font-size:12px; margin:4px 0; }
  .acct button { padding:3px 8px; }
  #profileTools { display:flex; gap:8px; margin:0 0 8px; flex-wrap:wrap; align-items:center; }
  #profileTools input { flex:0 1 300px; }
  #profiles { display:flex; gap:8px; margin:0 0 12px; overflow-x:auto; padding-bottom:2px; }
  .profile { min-width:220px; border:1px solid #30363d; border-radius:6px; padding:8px; background:#010409; font-size:12px; }
  .profile.current { border-color:#3fb950; }
  .profile .name { color:#e6edf3; word-break:break-all; font-size:13px; }
  .profile .meta { color:#8b949e; margin-top:2px; }
  .profile .members { color:#58a6ff; margin-top:4px; overflow-wrap:anywhere; }
  .profile button { padding:3px 8px; margin-top:6px; }
  #routePreview { color:#8b949e; font-size:12px; margin:-4px 0 10px; min-height:18px; }
  #readiness { color:#8b949e; font-size:12px; margin:-4px 0 10px; min-height:18px; }
  #readiness.ok { color:#3fb950; }
  #readiness.warn { color:#d29922; }
  #accountDiagnostics { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:8px; margin:0 0 12px; }
  .acctdiag { border:1px solid #30363d; border-radius:6px; padding:8px; background:#010409; font-size:12px; }
  .acctdiag.pass { border-color:#238636; }
  .acctdiag.fail { border-color:#8b5a12; }
  .acctdiag .head { color:#e6edf3; word-break:break-all; }
  .acctdiag .meta { color:#8b949e; margin-top:2px; }
  .acctdiag .bad { color:#f85149; }
  .acctdiag .good { color:#3fb950; }
  .acctdiag .next { color:#d29922; margin-top:4px; }
  #readinessChecks { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:6px; margin:-2px 0 12px; }
  .check { border:1px solid #30363d; border-radius:6px; padding:6px 8px; background:#010409; font-size:12px; }
  .check.pass { border-color:#238636; }
  .check.fail { border-color:#8b5a12; }
  .check .name { color:#e6edf3; }
  .check .evidence { color:#8b949e; margin-top:2px; }
  .check .next { color:#d29922; margin-top:2px; }
  #repairPlan { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:6px; margin:-2px 0 12px; }
  .repair { border:1px solid #30363d; border-radius:6px; padding:8px; background:#010409; font-size:12px; }
  .repair.runnable { border-color:#238636; }
  .repair.manual { border-color:#8b5a12; }
  .repair .title { color:#e6edf3; }
  .repair .cmd { color:#58a6ff; margin-top:4px; overflow-wrap:anywhere; }
  .repair .expect { color:#8b949e; margin-top:4px; }
  .repair .status { color:#8b949e; margin-top:4px; }
  #evidencePackage { border:1px solid #30363d; border-radius:8px; padding:10px; margin:0 0 12px; background:#010409; }
  #evidencePackage .head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; color:#e6edf3; }
  #evidencePackage textarea { width:100%; min-height:86px; box-sizing:border-box; resize:vertical; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:6px; padding:8px; font:12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; }
  #evidencePackage textarea#evidenceArtifactsInput { min-height:118px; margin-top:8px; }
  #evidencePackage .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  #evidenceManifestResult { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:6px; margin-top:8px; }
  #main { display:grid; grid-template-columns:minmax(220px, 300px) 1fr; gap:12px; align-items:stretch; }
  #sessions, #log { background:#010409; border:1px solid #30363d; border-radius:8px; padding:12px; height:520px; overflow-y:auto; }
  #log { white-space:pre-wrap; }
  #sessions { display:flex; flex-direction:column; gap:8px; }
  #sessionHead { display:flex; align-items:center; justify-content:space-between; gap:8px; color:#8b949e; font-size:12px; }
  #sessionHead button { padding:3px 8px; }
  .sess { border:1px solid #30363d; border-radius:6px; padding:8px; }
  .sess.active { border-color:#58a6ff; }
  .sess .id { color:#e6edf3; word-break:break-all; }
  .sess .meta { color:#8b949e; font-size:12px; margin:4px 0; }
  .sess button { padding:3px 8px; }
  .empty { color:#8b949e; font-size:12px; }
  .ev-text { color:#e6edf3; } .ev-tool { color:#d29922; } .ev-out { color:#8b949e; }
  .ev-done { color:#3fb950; } .ev-err { color:#f85149; } .ev-sys { color:#58a6ff; }
  .approval { background:#1c1207; border:1px solid #d29922; border-radius:6px; padding:8px; margin:6px 0; }
  .approval button { margin-right:6px; }
  #status { font-size:12px; color:#8b949e; }
  @media (max-width: 820px) { #main { grid-template-columns:1fr; } #sessions { height:220px; } }
</style>
</head>
<body>
<h1>CAP Web Client <span class="v" id="daemon"></span></h1>
<div id="status">connecting…</div>
<div id="bar">
  <select id="agent"></select>
  <select id="account"><option value="">不用账号</option><option value="auto">自动账号</option></select>
  <input id="accountProfile" placeholder="profile（路由仅自动账号）" style="flex:0 0 190px" />
  <input id="cwd" list="cwds" placeholder="项目目录（留空=主目录）" style="flex:0 0 260px" />
  <datalist id="cwds"></datalist>
  <input id="prompt" placeholder="让 agent 干点什么…" />
  <label><input id="requireFreshQuota" type="checkbox" /> fresh quota</label>
  <button id="previewRoute">预览路由</button>
  <button id="refreshDiagnostic">刷新诊断</button>
  <button id="deepVerify">深度验证</button>
  <button id="importCodex">导入 Codex</button>
  <button id="checkAccounts">检查账号</button>
  <button id="checkReady">就绪门禁</button>
  <label><input id="requireNativeSecret" type="checkbox" /> native secret</label>
  <button id="refreshSelectedQuota">刷新所选 quota</button>
  <button id="refreshAllQuota">刷新全部 quota</button>
  <button id="send">发送</button>
  <button id="cancel">中断</button>
</div>
<div id="accounts"></div>
<div id="profileTools">
  <input id="profileDescription" placeholder="profile 描述（保存时可选）" />
  <button id="refreshProfiles">刷新 profiles</button>
  <button id="saveProfile">保存 profile</button>
  <button id="setCurrentProfile">设为当前 profile</button>
  <button id="addProfileMember">加入所选账号</button>
  <button id="removeProfileMember">移除所选账号</button>
  <button id="deleteProfile">删除 profile</button>
</div>
<div id="profiles"></div>
<div id="routePreview"></div>
<div id="readiness">诊断等待连接…</div>
<div id="accountDiagnostics"></div>
<div id="readinessChecks"></div>
<div id="repairPlan"></div>
<div id="evidencePackage">
  <div class="head"><span>Live selftest evidence manifest</span><span class="empty">paste manifest.json or summary.json; report.html path is shown, not loaded</span></div>
  <textarea id="evidenceManifestInput" spellcheck="false" placeholder='{"manifestVersion":1,"status":"passed","artifacts":{"agentsRoute":"...","report":"report.html"}}'></textarea>
  <textarea id="evidenceArtifactsInput" spellcheck="false" placeholder='Optional artifact JSON objects, separated by blank lines. Example: {"routePolicy":{"name":"conservative-quota-pressure"},"routeCandidates":[...]}'></textarea>
  <div class="actions">
    <button id="renderEvidenceManifest">查看诊断包</button>
    <button id="exportEvidencePackage">导出 Evidence</button>
    <button id="clearEvidenceManifest">清空</button>
  </div>
  <div id="evidenceManifestResult"></div>
</div>
<div id="main">
  <div id="sessions">
    <div id="sessionHead"><span>Sessions</span><button id="refreshSessions">刷新</button></div>
    <div class="empty">暂无会话</div>
  </div>
  <div id="log"></div>
</div>

<script>
// token 来自 ~/.capd/token，通过 ?token=... 传入；WebSocket 握手用子协议 header 发送。
const params = new URLSearchParams(location.search);
const TOKEN = params.get("token") || "";
const CAPD = safeCAPDHost(params.get("capd"));
const REQUIRED_SECRET_BACKEND = normalizeSecretBackend(params.get("requireSecretBackend") || "");
const QUOTA_FRESH_MS = 30 * 60 * 1000;
if (TOKEN) {
  const cleanURL = new URL(location.href);
  cleanURL.searchParams.delete("token");
  history.replaceState(null, "", cleanURL.pathname + cleanURL.search + cleanURL.hash);
}

const log = document.getElementById("log");
const sessionsEl = document.getElementById("sessions");
const accountsEl = document.getElementById("accounts");
const profilesEl = document.getElementById("profiles");
const routePreviewEl = document.getElementById("routePreview");
const readinessEl = document.getElementById("readiness");
const accountDiagnosticsEl = document.getElementById("accountDiagnostics");
const readinessChecksEl = document.getElementById("readinessChecks");
const repairPlanEl = document.getElementById("repairPlan");
const evidenceManifestInputEl = document.getElementById("evidenceManifestInput");
const evidenceArtifactsInputEl = document.getElementById("evidenceArtifactsInput");
const evidenceManifestResultEl = document.getElementById("evidenceManifestResult");
const statusEl = document.getElementById("status");
let ws, nextId = 0, pending = {}, sessionId = null;
let lastHealthInfo = null;
let lastAccountsCheck = null;
let lastRouteDecision = null;
let lastProbeData = null;
const RPC_TIMEOUT_MS = 12000;
const LONG_RPC_TIMEOUT_MS = 120000;

function normalizeSecretBackend(value) {
  value = String(value || "").trim();
  return value === "file" || value === "native" ? value : "";
}

function readinessCommand(requiredBackend = "") {
  const backend = normalizeSecretBackend(requiredBackend);
  return `capd accounts check --json --readiness${backend ? ` --require-secret-backend ${backend}` : ""} --timeout 2m`;
}

function doctorCommand(requiredBackend = "") {
  const backend = normalizeSecretBackend(requiredBackend);
  return `capd doctor --json --fail --verify-secretstore${backend ? ` --require-secret-backend ${backend}` : ""} --timeout 2m`;
}

function promptFreeDoctorCommand(requiredBackend = "") {
  const backend = normalizeSecretBackend(requiredBackend);
  return `capd doctor --prompt-free --json --fail${backend ? ` --require-secret-backend ${backend}` : ""}`;
}

function requiredSecretBackend() {
  return REQUIRED_SECRET_BACKEND || (document.getElementById("requireNativeSecret").checked ? "native" : "");
}

function rpcTimeoutFor(method, params = {}) {
  if (method === "accounts/quota" || method === "agents/usage") return LONG_RPC_TIMEOUT_MS;
  if (method === "accounts/check" && (params.refreshQuota || params.requireFreshQuota || params.requireAllFreshQuota || params.requireMultiple)) return LONG_RPC_TIMEOUT_MS;
  return RPC_TIMEOUT_MS;
}

function rejectAllPending(message) {
  const err = { message };
  for (const id of Object.keys(pending)) {
    clearTimeout(pending[id].timer);
    pending[id].reject(err);
    delete pending[id];
  }
}

function safeCAPDHost(raw) {
  const fallback = location.host || "127.0.0.1:7777";
  const candidate = (raw || fallback).trim();
  if (!candidate) return fallback;
  try {
    const u = new URL(`ws://${candidate}`);
    const host = u.hostname.toLowerCase();
    if (u.host === location.host || host === "localhost" || host === "127.0.0.1" || host === "[::1]") return u.host;
  } catch (_) {}
  return fallback;
}

function line(cls, text) {
  const el = document.createElement("div");
  el.className = cls; el.textContent = text;
  log.appendChild(el); log.scrollTop = log.scrollHeight;
  return el;
}

function call(method, p) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      reject({ message: "CAP WebSocket is not connected" });
      return;
    }
    const id = ++nextId;
    const timeoutMS = rpcTimeoutFor(method, p || {});
    const timer = setTimeout(() => {
      if (!pending[id]) return;
      delete pending[id];
      reject({ message: `${method} timeout after ${timeoutMS}ms` });
    }, timeoutMS);
    pending[id] = { resolve, reject, timer };
    try {
      ws.send(JSON.stringify({ jsonrpc: "2.0", id, method, params: p }));
    } catch (e) {
      clearTimeout(timer);
      delete pending[id];
      reject(e);
    }
  });
}

function rpcError(error) {
  const e = new Error(error.message || JSON.stringify(error));
  e.data = error.data;
  return e;
}

function onEvent(ev) {
  const d = ev.data || {};
  switch (ev.type) {
    case "session.started": line("ev-sys", `· 会话引擎就绪 (${d.nativeSessionId || ""})`); break;
    case "output.text":
      if (d.delta) { appendDelta(d.text); }
      else if (!d.final) { line("ev-text", d.text); }
      else { closeDelta(); }
      break;
    case "tool.use": line("ev-tool", `⏵ ${d.command || d.kind}`); break;
    case "tool.result": if (!d.delta && d.output) line("ev-out", String(d.output).trimEnd()); break;
    case "approval.needed": renderApproval(d); break;
    case "usage.updated": break;
    case "task.done": closeDelta(); line(d.ok ? "ev-done" : "ev-err", d.ok ? "✓ 完成" : "✗ 失败/取消"); break;
    case "error": line("ev-err", `✗ ${d.message}`); break;
  }
}

let deltaEl = null;
function appendDelta(t) {
  if (!deltaEl) deltaEl = line("ev-text", "");
  deltaEl.textContent += t; log.scrollTop = log.scrollHeight;
}
function closeDelta() { deltaEl = null; }

function renderApproval(d) {
  const box = document.createElement("div");
  box.className = "approval";
  box.textContent = `⚠ 请求批准 [${d.kind}] ${d.command || ""} `;
  for (const [label, decision] of [["允许", "approve"], ["总是允许", "approveAlways"], ["拒绝", "deny"]]) {
    const b = document.createElement("button");
    b.textContent = label;
    b.onclick = async () => {
      await call("approval/reply", { sessionId, approvalId: d.approvalId, decision });
      box.textContent = `⚠ ${d.command || d.kind} → ${label}`;
    };
    box.appendChild(b);
  }
  log.appendChild(box); log.scrollTop = log.scrollHeight;
}

function clearLog() {
  log.textContent = "";
  deltaEl = null;
}

async function loadSessions() {
  try {
    const { sessions } = await call("session/list", {});
    renderSessions(sessions || []);
    updateCwdOptions(sessions || []);
  } catch (e) {
    renderSessions([], "会话列表不可用");
  }
}

async function loadAccounts() {
  try {
    const [allResult, codexResult] = await Promise.all([
      call("accounts/list", {}),
      call("accounts/list", { provider: "codex" })
    ]);
    renderAccounts(allResult.accounts || [], codexResult.currentAccountId || "");
    loadProfiles().catch(e => line("ev-sys", "· profiles/list 不可用: " + (e.message || JSON.stringify(e))));
    await refreshReadinessDiagnostic(codexResult);
  } catch (e) {
    accountsEl.textContent = "";
    routePreviewEl.textContent = "";
    readinessEl.className = "warn";
    readinessEl.textContent = "诊断不可用: accounts/list";
    line("ev-sys", "· accounts/list 不可用");
  }
}

function lightweightAccountsResult(listResult, healthInfo = null) {
  const accounts = (listResult && listResult.accounts || []).filter(a => !a.provider || a.provider === "codex").map(a => ({
    id: a.id,
    email: a.email || "",
    authMode: a.authMode || "",
    current: a.id === (listResult && listResult.currentAccountId),
    credentialReadable: false,
    runtimeReady: false,
    authJsonPrivate: false,
    projectionMarkerOk: false,
    secretBackendOk: false,
    promptFree: true,
    quotaFresh: accountQuotaFresh(a),
    quotaState: accountQuotaState(a),
    quotaCheckedAt: accountQuotaCheckedAt(a),
    primaryUsedPercent: accountPrimaryUsedPercent(a)
  }));
  const secretBackend = (healthInfo && healthInfo.secretBackend) || "";
  return {
    provider: "codex",
    checkedAccounts: accounts.length,
    secretBackend,
    quotaRefreshed: false,
    promptFree: true,
    summary: lightweightAccountsSummary(accounts, secretBackend),
    accounts
  };
}

function lightweightAccountsSummary(accounts, secretBackend) {
  const checked = accounts.length;
  const required = 2;
  const fresh = accounts.filter(a => a.quotaFresh).length;
  const stale = accounts.filter(a => a.quotaState === "stale").length;
  const missingQuota = accounts.filter(a => !a.quotaState || a.quotaState === "missing").length;
  return {
    ready: false,
    checkedAccounts: checked,
    requiredAccounts: required,
    missingAccounts: Math.max(0, required - checked),
    freshQuotaAccounts: fresh,
    staleQuotaAccounts: stale,
    missingQuotaAccounts: missingQuota,
    secretBackend
  };
}

async function importCodexAccount() {
  const authPath = prompt("Codex auth.json 路径（留空使用默认；多个路径用换行或逗号分隔）", "");
  if (authPath === null) return;
  const button = document.getElementById("importCodex");
  button.disabled = true;
  try {
    const params = { provider: "codex" };
    const authPaths = splitAuthPaths(authPath);
    if (authPaths.length === 1) params.authPath = authPaths[0];
    if (authPaths.length > 1) params.authPaths = authPaths;
    const result = await call("accounts/import", params);
    const imported = result.accounts && result.accounts.length ? result.accounts : [result.account].filter(Boolean);
    const labels = imported.map(a => a.email || a.id).join(", ");
    const total = result.importedAccounts || imported.length;
    line("ev-sys", `· 已导入 Codex 账号 ${labels || "unknown"}${imported.length > 1 ? ` (${imported.length})` : ""} · total ${total}`);
    const nextStep = accountsImportNextStep(total);
    if (nextStep) line("ev-sys", `· next ${nextStep}`);
    await loadAccounts();
  } catch (e) {
    line("ev-err", `✗ 导入 Codex 失败: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

function splitAuthPaths(value) {
  return String(value || "").split(/\r?\n|,/).map(p => p.trim()).filter(Boolean);
}

function accountsImportNextStep(importedAccounts) {
  if (!importedAccounts) return "";
  if (importedAccounts < 2) return "继续导入第二个 Codex 账号";
  return "运行就绪门禁或 " + readinessCommand(requiredSecretBackend());
}

async function checkAccounts(readinessGate = false) {
  const button = document.getElementById(readinessGate ? "checkReady" : "checkAccounts");
  button.disabled = true;
  try {
    const params = { provider: "codex" };
    if (readinessGate) {
      params.refreshQuota = true;
      params.requireMultiple = true;
      params.requireFreshQuota = true;
      params.requireAllFreshQuota = true;
      const requiredBackend = requiredSecretBackend();
      if (requiredBackend) params.requireSecretBackend = requiredBackend;
    }
    const result = await call("accounts/check", params);
    lastAccountsCheck = result;
    const route = result.autoRoute ? ` · auto ${result.autoRoute.accountId || ""} ${routeEvidenceSummary(result.autoRoute)}` : "";
    const policy = routePolicySummary(result.routePolicy);
    if (readinessGate) line("ev-sys", `· readiness quota refreshed ${result.quotaRefreshed ? "yes" : "no"}`);
    line("ev-sys", `· 账号检查完成 ${result.checkedAccounts} 个${route}`);
    if (policy) line("ev-sys", `· route policy ${policy}`);
    const evidence = accountCheckSummary(result.accounts || []);
    if (evidence) line("ev-sys", `· quota evidence ${evidence}`);
    renderAccountDiagnostics(result);
    renderAccountsCheckRepairPlan(result);
    await loadAccounts();
  } catch (e) {
    const label = readinessGate ? "就绪门禁失败" : "账号检查失败";
    line("ev-err", `✗ ${label}: ${e.message || JSON.stringify(e)}`);
    if (e.data) {
      lastAccountsCheck = e.data;
      const route = e.data.autoRoute ? ` · auto ${e.data.autoRoute.accountId || ""} ${routeEvidenceSummary(e.data.autoRoute)}` : "";
      const policy = routePolicySummary(e.data.routePolicy);
      line("ev-sys", `· partial evidence ${e.data.checkedAccounts || 0} 个${route}`);
      if (policy) line("ev-sys", `· route policy ${policy}`);
      const evidence = accountCheckSummary(e.data.accounts || []);
      if (evidence) line("ev-sys", `· partial quota evidence ${evidence}`);
      renderAccountDiagnostics(e.data);
      renderAccountsCheckRepairPlan(e.data);
    }
  } finally {
    button.disabled = false;
  }
}

function renderAccountsCheckRepairPlan(result) {
  const steps = result && result.repairPlan || [];
  renderRepairPlan(steps);
  for (const step of steps) {
    const classification = repairStepClassification(step);
    line("ev-sys", `· repair ${step.id || "step"} ${classification.runnable ? "runnable" : "manual"}: ${step.command || ""}`);
    if (!classification.runnable && classification.reason) line("ev-sys", `· manual reason ${classification.reason}`);
    if (step.expectedEvidence) line("ev-sys", `· expect ${step.expectedEvidence}`);
  }
}

async function refreshReadinessDiagnostic(codexListResult = null) {
  readinessEl.className = "";
  readinessChecksEl.textContent = "";
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    readinessEl.textContent = "诊断等待连接…";
    return;
  }
  readinessEl.textContent = "诊断中…";
  try {
    const healthInfo = await checkDaemonHealth(false);
    const requiredBackend = requiredSecretBackend();
    const listResult = codexListResult || await call("accounts/list", { provider: "codex" });
    const result = lightweightAccountsResult(listResult, healthInfo);
    let route = null;
    let routeError = "";
    try {
      route = await call("agents/route", { accountId: "auto" });
      lastRouteDecision = route;
    } catch (e) {
      routeError = e.message || JSON.stringify(e);
      if (e.data) {
        route = e.data;
        lastRouteDecision = e.data;
      }
    }
    lastAccountsCheck = result;
    renderReadinessDiagnosticResult({ result, route, routeError, requiredSecretBackend: requiredBackend });
  } catch (e) {
    if (e.data) {
      let route = null;
      let routeError = "";
      try {
        route = await call("agents/route", { accountId: "auto" });
        lastRouteDecision = route;
      } catch (routeErr) {
        routeError = routeErr.message || JSON.stringify(routeErr);
        if (routeErr.data) {
          route = routeErr.data;
          lastRouteDecision = routeErr.data;
        }
      }
      lastAccountsCheck = e.data;
      renderReadinessDiagnosticResult({ result: e.data, route, routeError, readinessError: e.message || JSON.stringify(e), requiredSecretBackend: requiredSecretBackend() });
      return;
    }
    readinessEl.className = "warn";
    readinessEl.textContent = "诊断不可用: " + (e.message || JSON.stringify(e));
    renderReadinessChecks([
      { name: "daemon/CAP diagnostic", ok: false, evidence: e.message || JSON.stringify(e), nextStep: "确认 capd start 正在运行，然后刷新诊断" }
    ]);
  }
}

async function deepVerify() {
  const button = document.getElementById("deepVerify");
  button.disabled = true;
  try {
    const requiredBackend = requiredSecretBackend();
    line("ev-sys", `· deep verify start${requiredBackend ? ` · secret ${requiredBackend}` : ""}`);
    const data = await fetchProbeData({ readiness: true, requireSecretBackend: requiredBackend });
    renderProbeDataResult(data);
    if (!data.ok) {
      line("ev-err", "✗ deep verify not ready");
      return;
    }
    line("ev-done", "✓ deep verify ready");
  } catch (e) {
    line("ev-err", `✗ deep verify failed: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

async function fetchProbeData({ readiness = false, requireSecretBackend = "" } = {}) {
  if (!TOKEN) throw new Error("missing daemon token for /probe/data");
  const url = new URL(capdHTTPURL("/probe/data"));
  if (readiness) url.searchParams.set("readiness", "1");
  if (requireSecretBackend) url.searchParams.set("requireSecretBackend", requireSecretBackend);
  const res = await fetch(url.toString(), {
    cache: "no-store",
    headers: { Authorization: `Bearer ${TOKEN}` }
  });
  const text = await res.text();
  let data;
  try {
    data = JSON.parse(text);
  } catch (_) {
    throw new Error(`/probe/data ${res.status}: ${text || "invalid JSON"}`);
  }
  if (!res.ok && !data) throw new Error(`/probe/data ${res.status}`);
  return data;
}

function renderProbeDataResult(data) {
  lastProbeData = data;
  const result = data.accountsCheck || {};
  result.summary = data.summary || result.summary || {};
  result.checkedAccounts = result.checkedAccounts || result.summary.checkedAccounts || 0;
  result.secretBackend = result.secretBackend || result.summary.secretBackend || "";
  if (data.autoRoute && !result.autoRoute) result.autoRoute = data.autoRoute;
  if (data.routeCandidates && !result.routeCandidates) result.routeCandidates = data.routeCandidates;
  lastAccountsCheck = result;
  if (data.routeDecision) lastRouteDecision = data.routeDecision;
  renderReadinessDiagnosticResult({
    result,
    route: data.routeDecision || { accountRoute: data.autoRoute, routeCandidates: data.routeCandidates },
    routeError: probeErrorSummary(data.errors, "agents/route"),
    readinessError: data.ok ? "" : probeErrorSummary(data.errors, "accounts/check"),
    requiredSecretBackend: data.summary && data.summary.requiredSecretBackend || requiredSecretBackend()
  });
  renderRepairPlan(data.repairPlan || []);
  const summary = data.summary || {};
  line("ev-sys", `· probe summary ready=${!!summary.ready} accounts=${summary.checkedAccounts || 0}/${summary.requiredAccounts || 0} fresh=${summary.freshQuotaAccounts || 0} routeCandidates=${summary.routeCandidates || 0} secretOK=${!!summary.secretBackendOk}`);
  for (const check of data.checks || []) {
    line(check.ok ? "ev-done" : "ev-err", `${check.ok ? "✓" : "✗"} ${check.name}: ${check.evidence || ""}${check.nextStep ? ` · next ${check.nextStep}` : ""}`);
  }
  for (const next of data.nextSteps || []) {
    line("ev-sys", `· next ${next}`);
  }
  for (const step of data.repairPlan || []) {
    line("ev-sys", `· repair ${step.id || "step"}: ${step.command || ""}`);
    if (step.expectedEvidence) line("ev-sys", `· expect ${step.expectedEvidence}`);
  }
  for (const err of data.errors || []) {
    line("ev-err", `✗ ${err.source || "probe"} code=${err.code || 0} ${err.message || ""}`);
  }
}

function renderRepairPlan(steps) {
  repairPlanEl.textContent = "";
  for (const [index, step] of (steps || []).entries()) {
    const classification = repairStepClassification(step);
    const box = document.createElement("div");
    box.className = "repair " + (classification.runnable ? "runnable" : "manual");
    const title = document.createElement("div");
    title.className = "title";
    title.textContent = `${index + 1}. ${step.title || step.id || "Repair step"}`;
    const cmd = document.createElement("div");
    cmd.className = "cmd";
    cmd.textContent = step.command || "";
    const status = document.createElement("div");
    status.className = "status";
    status.textContent = classification.runnable ? "runnable with: capd repair run --execute --yes" : `manual: ${classification.reason}`;
    box.append(title, cmd, status);
    if (step.expectedEvidence) {
      const expect = document.createElement("div");
      expect.className = "expect";
      expect.textContent = `expect: ${step.expectedEvidence}`;
      box.appendChild(expect);
    }
    repairPlanEl.appendChild(box);
  }
}

function repairStepClassification(step) {
  if (step && step.execution && typeof step.execution.runnable === "boolean") {
    return { runnable: step.execution.runnable, reason: step.execution.reason || "server classified repair step" };
  }
  const command = String(step && step.command || "").trim();
  if (!command) return { runnable:false, reason:"empty command" };
  if (command.includes("/path/") || command.includes("<") || command.includes("...")) return { runnable:false, reason:"command contains placeholders" };
  if (command.startsWith("capd start")) return { runnable:false, reason:"starts a foreground daemon" };
  if (command.startsWith("export ")) return { runnable:false, reason:"changes shell environment" };
  const bin = repairCommandBinary(command);
  if (bin !== "capd" && bin !== "make") return { runnable:false, reason:"outside repair runner allowlist" };
  if (step && step.id === "final-live-preflight") return { runnable:false, reason:"requires --include-final" };
  return { runnable:true, reason:"safe repair runner allowlist" };
}

function repairCommandBinary(command) {
  const fields = String(command || "").trim().split(/\s+/).filter(Boolean);
  while (fields.length && fields[0].includes("=") && !fields[0].startsWith("-")) fields.shift();
  return fields[0] || "";
}

function probeErrorSummary(errors, source) {
  const err = (errors || []).find(e => e.source === source);
  return err ? err.message || "" : "";
}

function renderReadinessDiagnosticResult({ result, route, routeError = "", readinessError = "", requiredSecretBackend = "" }) {
  const accounts = result.accounts || [];
  const freshCount = accounts.filter(a => a.quotaFresh).length;
  const issues = [];
  if ((result.checkedAccounts || 0) < 2) issues.push("需要至少 2 个 Codex 账号");
  if (accounts.length && freshCount < accounts.length) issues.push("quota 未全部 fresh");
  const autoRoute = result.autoRoute || (route && route.accountRoute);
  if (!autoRoute || !autoRoute.fresh) issues.push("auto route 缺 fresh quota");
  if (requiredSecretBackend && result.secretBackend !== requiredSecretBackend) issues.push(`${requiredSecretBackend} SecretStore 未启用`);
  if (readinessError) issues.push("readiness gate failed");
  const checks = readinessCheckRows({ result, accounts, freshCount, autoRoute, route, routeError, readinessError, requiredSecretBackend });
  const summary = readinessSummaryText({ result, accounts, freshCount, autoRoute, route, requiredSecretBackend });
  const parts = [
    "daemon ok",
    summary,
    `codex ${result.checkedAccounts || 0}`,
    `secret ${result.secretBackend || "unknown"}`,
    `quota fresh ${freshCount}/${accounts.length}`
  ];
  const accountEvidence = accountCheckSummary(accounts);
  if (accountEvidence) parts.push(`accounts ${accountEvidence}`);
  if (autoRoute) parts.push(`auto ${autoRoute.accountId || (route && route.accountId) || "unknown"} ${routeEvidenceSummary(autoRoute)}`);
  if (route) parts.push(`route ${routeDecisionSummary(route)}`);
  const candidates = routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates));
  if (candidates) parts.push(`candidates ${candidates}`);
  if (readinessError) parts.push(`readiness error ${readinessError}`);
  if (routeError) parts.push(`route error ${routeError}`);
  readinessEl.className = issues.length ? "warn" : "ok";
  readinessEl.textContent = issues.length ? `${parts.join(" · ")} · ${issues.join(" · ")}` : `${parts.join(" · ")} · ready`;
  renderReadinessChecks(checks);
  renderAccountDiagnostics(result);
}

function readinessSummaryText({ result, accounts, freshCount, autoRoute, route, requiredSecretBackend = "" }) {
  const summary = result.summary || {};
  const checked = summary.checkedAccounts ?? result.checkedAccounts ?? 0;
  const required = summary.requiredAccounts || 2;
  const missing = summary.missingAccounts ?? Math.max(0, required - checked);
  const stale = summary.staleQuotaAccounts ?? accounts.filter(a => a.quotaState === "stale").length;
  const missingQuota = summary.missingQuotaAccounts ?? accounts.filter(a => !a.quotaState || a.quotaState === "missing").length;
  const fresh = summary.freshQuotaAccounts ?? freshCount;
  const secretBackend = summary.secretBackend || result.secretBackend || "unknown";
  const requiredBackend = summary.requiredSecretBackend || requiredSecretBackend;
  const routeOK = typeof summary.routeDecisionOk === "boolean" ? summary.routeDecisionOk : !!(route && route.accountRoute);
  const secretOK = typeof summary.secretBackendOk === "boolean" ? summary.secretBackendOk : (!requiredBackend || secretBackend === requiredBackend);
  const autoFresh = typeof summary.autoRouteFresh === "boolean" ? summary.autoRouteFresh : !!(autoRoute && autoRoute.fresh);
  const ready = missing === 0 && checked > 0 && fresh === checked && autoFresh && routeOK && secretOK;
  const requiredSecret = requiredBackend ? ` required secret ${requiredBackend}` : "";
  return `summary ready ${ready} accounts ${checked}/${required} missing ${missing} quota fresh ${fresh} stale ${stale} missing quota ${missingQuota} auto fresh ${autoFresh} route decision ${routeOK} secret ok ${secretOK}${requiredSecret}`;
}

function readinessCheckRows({ result, accounts, freshCount, autoRoute, route, routeError, readinessError = "", requiredSecretBackend = "" }) {
  const checked = result.checkedAccounts || 0;
  const secretBackend = result.secretBackend || "unknown";
  const promptFree = !!result.promptFree;
  const requiredBackend = (result.summary && result.summary.requiredSecretBackend) || requiredSecretBackend;
  const secretOK = !requiredBackend || secretBackend === requiredBackend;
  const promptFreeDoctor = promptFreeDoctorCommand(requiredBackend);
  const secretNextStep = !secretOK ? `restart daemon with: capd start --secret-backend ${requiredBackend}` : (requiredBackend === "native" && !promptFree ? `deep verify with: ${doctorCommand(requiredBackend)}` : "");
  const readinessNextStep = readinessCommand(requiredBackend);
  const quotaNextStep = promptFree ? `safe no-prompt audit: ${promptFreeDoctor}; deep quota refresh: ${readinessNextStep}` : `运行就绪门禁或 ${readinessNextStep}`;
  const routeFreshNextStep = promptFree ? `safe no-prompt audit: ${promptFreeDoctor}; deep route gate: capd agents route --account auto --require-fresh-quota --json` : "刷新 quota 后运行 capd agents route --account auto --require-fresh-quota --json";
  const readinessEvidence = promptFree ? "prompt-free diagnostic; SecretStore credentials and runtime not checked" : (readinessError || "no blocking readiness error");
  const readinessNext = promptFree ? `run explicit readiness when ready for SecretStore access: ${readinessNextStep}` : (readinessError ? "按 partial evidence 修复账号、quota 或 SecretStore 后重跑就绪门禁" : "");
  const multiAccountNextStep = "导入至少两个账号: capd accounts import --auth /path/a/auth.json --auth /path/b/auth.json，或使用 CAPD_CODEX_AUTH_PATHS 批量导入（macOS/Linux 用 ':'，Windows 用 ';' 分隔）";
  return [
    { name: "daemon health", ok: true, evidence: "health ok", nextStep: "" },
    { name: "Codex multi-account import", ok: checked >= 2, evidence: `checked ${checked}, need 2`, nextStep: checked >= 2 ? "" : multiAccountNextStep },
    { name: "Codex quota freshness", ok: accounts.length > 0 && freshCount === accounts.length, evidence: `fresh ${freshCount}/${accounts.length}`, nextStep: accounts.length > 0 && freshCount === accounts.length ? "" : quotaNextStep },
    { name: "Codex auto route freshness", ok: !!(autoRoute && autoRoute.fresh), evidence: autoRoute ? routeEvidenceSummary(autoRoute) : "auto route missing", nextStep: autoRoute && autoRoute.fresh ? "" : routeFreshNextStep },
    { name: "readiness gate", ok: !readinessError && !promptFree, evidence: readinessEvidence, nextStep: readinessNext },
    { name: "route decision", ok: !!route, evidence: route ? routeDecisionSummary(route) : routeError || "route missing", nextStep: route ? "" : "运行 capd agents route --account auto --require-fresh-quota --json" },
    { name: "route candidates", ok: !!routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates)), evidence: routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates)) || "no routeCandidates evidence", nextStep: routeCandidateSummary(result.routeCandidates || (route && route.routeCandidates)) ? "" : "刷新诊断或运行 capd agents route --account auto --json" },
    { name: "SecretStore backend", ok: secretOK, evidence: requiredBackend ? `secret ${secretBackend}, want ${requiredBackend}` : `secret ${secretBackend}`, nextStep: requiredBackend ? secretNextStep : "" }
  ];
}

function renderReadinessChecks(checks) {
  readinessChecksEl.textContent = "";
  renderRepairPlan([]);
  for (const check of checks) {
    const box = document.createElement("div");
    box.className = "check " + (check.ok ? "pass" : "fail");
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = `${check.ok ? "pass" : "fail"} · ${check.name}`;
    const evidence = document.createElement("div");
    evidence.className = "evidence";
    evidence.textContent = check.evidence || "";
    box.append(name, evidence);
    if (check.nextStep) {
      const next = document.createElement("div");
      next.className = "next";
      next.textContent = check.nextStep;
      box.appendChild(next);
    }
    readinessChecksEl.appendChild(box);
  }
}

function renderAccountDiagnostics(result) {
  accountDiagnosticsEl.textContent = "";
  if (!result) return;
  const summary = result.summary || {};
  const promptFree = !!result.promptFree;
  const header = document.createElement("div");
  header.className = "acctdiag " + (summary.ready ? "pass" : "fail");
  const title = document.createElement("div");
  title.className = "head";
  title.textContent = `${promptFree ? "accounts/list" : "accounts/check"} · ${result.checkedAccounts || 0} checked · ${summary.ready ? "ready" : "not ready"}`;
  const meta = document.createElement("div");
  meta.className = "meta";
  meta.textContent = accountDiagnosticSummary(result);
  header.append(title, meta);
  if (!summary.ready) {
    const next = document.createElement("div");
    next.className = "next";
    next.textContent = accountDiagnosticNextStep(result);
    header.appendChild(next);
  }
  accountDiagnosticsEl.appendChild(header);
  const accounts = result.accounts || [];
  for (const account of accounts) accountDiagnosticsEl.appendChild(accountDiagnosticCard(account, promptFree));
  if (accounts.length === 0 && (result.checkedAccounts || 0) > 0) {
    const empty = document.createElement("div");
    empty.className = "acctdiag fail";
    empty.textContent = promptFree ? "accounts/list returned no per-account evidence" : "accounts/check failed before per-account evidence was available";
    accountDiagnosticsEl.appendChild(empty);
  }
}

function accountDiagnosticSummary(result) {
  const summary = result.summary || {};
  const parts = [
    `secret ${result.secretBackend || summary.secretBackend || "unknown"}`,
    `quota refreshed ${result.quotaRefreshed ? "yes" : "no"}`,
    `fresh ${summary.freshQuotaAccounts ?? 0}/${result.checkedAccounts || 0}`,
    `stale ${summary.staleQuotaAccounts ?? 0}`,
    `missing quota ${summary.missingQuotaAccounts ?? 0}`
  ];
  if (summary.requiredSecretBackend) parts.push(`required secret ${summary.requiredSecretBackend}`);
  if (result.autoRoute) parts.push(`auto ${result.autoRoute.accountId || "unknown"} ${routeEvidenceSummary(result.autoRoute)}`);
  return parts.join(" · ");
}

function accountDiagnosticCard(account, promptFree = false) {
  const ok = (promptFree || (account.secretBackendOk && account.credentialReadable && account.runtimeReady)) && account.quotaFresh;
  const card = document.createElement("div");
  card.className = "acctdiag " + (ok ? "pass" : "fail");
  const head = document.createElement("div");
  head.className = "head";
  head.textContent = `${account.current ? "* " : ""}${account.email || account.id || "unknown"}`;
  const secret = document.createElement("div");
  secret.className = promptFree || (account.secretBackendOk && account.credentialReadable) ? "meta good" : "meta bad";
  secret.textContent = promptFree ? "secret not checked in prompt-free refresh" : `secret ${account.secretState || "unknown"} · backend ${boolWord(account.secretBackendOk)} · readable ${boolWord(account.credentialReadable)}`;
  const runtime = document.createElement("div");
  runtime.className = promptFree || account.runtimeReady ? "meta good" : "meta bad";
  runtime.textContent = promptFree ? "runtime not checked in prompt-free refresh" : `runtime ${boolWord(account.runtimeReady)} · auth ${boolWord(account.authJsonPrivate)} · marker ${boolWord(account.projectionMarkerOk)}`;
  const quota = document.createElement("div");
  quota.className = account.quotaFresh ? "meta good" : "meta bad";
  quota.textContent = accountQuotaDiagnosticText(account);
  card.append(head, secret, runtime, quota);
  const next = promptFree ? accountPromptFreeNextStep(account) : accountDiagnosticIssue(account);
  if (next) {
    const el = document.createElement("div");
    el.className = "next";
    el.textContent = next;
    card.appendChild(el);
  }
  return card;
}

function accountPromptFreeNextStep(account) {
  const audit = promptFreeDoctorCommand(requiredSecretBackend());
  if (!account.quotaFresh) return `safe no-prompt audit: ${audit}; refresh quota only when ready for SecretStore access`;
  return `safe no-prompt audit: ${audit}; explicit readiness checks may read SecretStore credentials`;
}

function accountQuotaDiagnosticText(account) {
  const parts = [`quota ${account.quotaState || "missing"}`, account.quotaFresh ? "fresh" : "not-fresh"];
  if (hasNumber(account.primaryUsedPercent)) parts.push(`primary ${account.primaryUsedPercent}%`);
  if (account.quotaCheckedAt) parts.push(`checked ${new Date(account.quotaCheckedAt * 1000).toLocaleString()}`);
  return parts.join(" · ");
}

function accountDiagnosticIssue(account) {
  if (!account.secretBackendOk) return `secret backend ${account.secretState || "not ready"}; align CAPD_SECRET_BACKEND or re-import account`;
  if (!account.credentialReadable) return secretAccessNextStep(account.secretState);
  if (!account.runtimeReady) return "project account runtime with 准备运行 or rerun accounts/check";
  if (!account.quotaFresh) return "refresh quota for this account or run 就绪门禁";
  return "";
}

function secretAccessNextStep(state) {
  if (state === "timeout") return "unlock or approve OS SecretStore access, then rerun readiness";
  if (state === "access-denied") return "macOS Keychain access was denied; approve the prompt, or restart with file SecretStore and re-import";
  if (state === "unreadable") return "credential unreadable; approve macOS Keychain access, or restart with file SecretStore and re-import";
  return `credential ${state || "unreadable"}; unlock SecretStore or re-import account`;
}

function accountDiagnosticNextStep(result) {
  const accounts = result.accounts || [];
  const summary = result.summary || {};
  if ((result.checkedAccounts || 0) < 2) {
    const audit = promptFreeDoctorCommand(summary.requiredSecretBackend || requiredSecretBackend());
    if (result.promptFree) return `import a second Codex account, then run safe no-prompt audit: ${audit}`;
    return "import a second Codex account, then run 就绪门禁";
  }
  if (result.promptFree) {
    const audit = promptFreeDoctorCommand(summary.requiredSecretBackend || requiredSecretBackend());
    if (accounts.some(a => !a.quotaFresh)) return `safe no-prompt audit: ${audit}; refresh quota for all accounts only when ready for SecretStore access`;
    return `safe no-prompt audit: ${audit}; use explicit readiness only when ready for SecretStore credential checks`;
  }
  if (summary.requiredSecretBackend && !summary.secretBackendOk) return `restart daemon with capd start --secret-backend ${summary.requiredSecretBackend}`;
  if (accounts.some(a => !a.secretBackendOk || !a.credentialReadable)) return "approve macOS Keychain access, or restart with file SecretStore and re-import failing accounts";
  if (accounts.some(a => !a.runtimeReady)) return "project each failing account runtime, then rerun accounts/check";
  if (accounts.some(a => !a.quotaFresh)) return "refresh quota for all accounts";
  return "rerun 就绪门禁 after fixing the failed check";
}

function boolWord(value) {
  return value ? "ok" : "fail";
}

function accountCheckSummary(accounts) {
  return accounts.map(a => {
    const parts = [a.id || "unknown", accountQuotaState(a)];
    if (a.secretState) parts.push(`secret ${a.secretState}`);
    if (typeof a.quotaFresh === "boolean") parts.push(accountQuotaFresh(a) ? "fresh" : "not-fresh");
    const primary = accountPrimaryUsedPercent(a);
    const checkedAt = accountQuotaCheckedAt(a);
    if (hasNumber(primary)) parts.push(`primary ${primary}%`);
    if (checkedAt) parts.push(`checked ${new Date(checkedAt * 1000).toLocaleString()}`);
    return parts.join(" ");
  }).join(" · ");
}

function renderAccounts(accounts, currentAccountId) {
  accountsEl.textContent = "";
  const accountSel = document.getElementById("account");
  const selected = accountSel.value;
  let codexAccounts = 0;
  accountSel.textContent = "";
  accountSel.appendChild(new Option("不用账号", ""));
  const autoOption = new Option("自动账号", "auto");
  if (selected === "auto") autoOption.selected = true;
  accountSel.appendChild(autoOption);
  for (const a of accounts) {
    const isCodex = a.provider === "codex";
    if (isCodex) {
      codexAccounts += 1;
      const option = new Option(accountLabel(a), a.id);
      if ((selected && a.id === selected) || (!selected && a.id === currentAccountId)) option.selected = true;
      accountSel.appendChild(option);
    }

    const card = document.createElement("div");
    card.className = "acct" + (isCodex && a.id === accountSel.value ? " active" : "");
    card.dataset.accountId = a.id;
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = a.email || a.id;
    const provider = document.createElement("div");
    provider.className = "provider";
    provider.textContent = a.provider || "unknown";
    const quota = document.createElement("div");
    quota.className = "quota";
    quota.textContent = quotaLabel(a);
    card.append(name, provider, quota);
    const routeAudit = routeAuditLabel(a);
    if (routeAudit) {
      const route = document.createElement("div");
      route.className = "quota";
      route.textContent = routeAudit;
      card.appendChild(route);
    }
    if (isCodex) {
      const current = document.createElement("button");
      current.textContent = "设为当前";
      current.disabled = a.id === currentAccountId;
      current.onclick = () => setCurrentAccount(a.id, current);
      const project = document.createElement("button");
      project.textContent = "准备运行";
      project.onclick = () => projectAccount(a.id, project);
      const refresh = document.createElement("button");
      refresh.textContent = "刷新 quota";
      refresh.onclick = () => refreshQuota(a.id, refresh);
      const remove = document.createElement("button");
      remove.textContent = "移除";
      remove.onclick = () => removeAccount(a.id, remove);
      card.append(current, project, refresh, remove);
    }
    accountsEl.appendChild(card);
  }
  if (accounts.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "暂无账号，先导入 Codex";
    accountsEl.appendChild(empty);
  } else if (codexAccounts === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "暂无 Codex 账号，先导入 Codex";
    accountsEl.appendChild(empty);
  }
  markActiveAccount();
  updateProfileControl();
  previewRoute();
}

async function loadProfiles(name = "") {

  const params = { provider: "codex" };
  if (name) params.name = name;
  const result = await call("profiles/list", params);
  renderProfiles(result);
}

function renderProfiles(result) {
  profilesEl.textContent = "";
  const profiles = result.profiles || [];
  for (const p of profiles) {
    const card = document.createElement("div");
    card.className = "profile" + (p.current ? " current" : "");
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = `${p.provider || "codex"}/${p.name}`;

async function previewRoute() {

  }
  try {

    lastRouteDecision = routed;
    routePreviewEl.textContent = routeDecisionSummary(routed);
  } catch (e) {
    if (e.data) lastRouteDecision = e.data;
    const partial = e.data ? ` · ${routeDecisionSummary(e.data)}` : "";
    routePreviewEl.textContent = "路由不可用: " + (e.message || JSON.stringify(e)) + partial;
  }
}

function routeDecisionSummary(routed) {
  const agent = routed.agent || {};
  const parts = [`agent ${agent.id || "unknown"}`];
  if (routed.accountId) parts.push(`account ${routed.accountId}`);
  if (routed.accountRoute) parts.push(routeEvidenceSummary(routed.accountRoute));
  const candidates = routeCandidateSummary(routed.routeCandidates);
  if (candidates) parts.push(`candidates ${candidates}`);
  const policy = routePolicySummary(routed.routePolicy);
  if (policy) parts.push(`policy ${policy}`);
  if (routed.reason) parts.push(routed.reason);
  return parts.join(" · ");
}

function routeCandidateSummary(candidates) {
  if (!Array.isArray(candidates) || candidates.length === 0) return "";
  return candidates.map(c => `${c.accountId || "unknown"} ${routeEvidenceSummary(c)}`).join(" | ");
}

function routeEvidenceSummary(route) {
  const parts = [`quota ${route.quotaState || "missing"}`];
  if (typeof route.fresh === "boolean") parts.push(route.fresh ? "fresh" : "not-fresh");
  if (route.secretBackend) parts.push(`secret ${route.secretBackend}`);
  if (hasNumber(route.primaryUsedPercent)) parts.push(`primary ${route.primaryUsedPercent}%`);
  if (hasNumber(route.secondaryUsedPercent)) parts.push(`secondary ${route.secondaryUsedPercent}%`);
  if (hasNumber(route.codeReviewUsedPercent)) parts.push(`review ${route.codeReviewUsedPercent}%`);
  if (hasNumber(route.limitingUsedPercent) && route.limitingQuotaDimension && route.limitingQuotaDimension !== "primary") parts.push(`limiting ${route.limitingQuotaDimension} ${route.limitingUsedPercent}%`);
  if (hasNumber(route.score)) parts.push(`score ${route.score}`);
  if (route.checkedAt) parts.push(`checked ${new Date(route.checkedAt * 1000).toLocaleString()}`);
  if (route.reason) parts.push(route.reason);
  return parts.join(" ");
}

function routePolicySummary(policy) {
  if (!policy) return "";
  const parts = [];
  if (policy.name) parts.push(policy.name);
  if (hasNumber(policy.freshTtlSeconds)) parts.push(`ttl ${policy.freshTtlSeconds}s`);
  if (hasNumber(policy.unknownScore)) parts.push(`unknown ${policy.unknownScore}`);
  if (hasNumber(policy.currentAccountTieBreak)) parts.push(`tie ${policy.currentAccountTieBreak}`);
  if (Array.isArray(policy.quotaWindows) && policy.quotaWindows.length) parts.push(`windows ${policy.quotaWindows.join("/")}`);
  return parts.join(" ");
}

function accountLabel(a) {
  const state = accountQuotaState(a);
  const primary = accountPrimaryUsedPercent(a);
  const quota = hasNumber(primary) ? ` · ${primary}% ${state}` : ` · ${state}`;
  return `${a.provider || "unknown"} · ${a.email || a.id}${a.plan ? " · " + a.plan : ""}${quota}`;
}

function quotaLabel(a) {
  const state = accountQuotaState(a);
  const parts = [];
  const quota = a.quota || {};
  if (quota.plan || a.plan) parts.push(quota.plan || a.plan);
  parts.push(`quota ${state}`);
  const primary = accountPrimaryUsedPercent(a);
  const checkedAt = accountQuotaCheckedAt(a);
  if (hasNumber(primary)) parts.push(`primary ${primary}%`);
  if (hasNumber(quota.secondaryUsedPercent)) parts.push(`secondary ${quota.secondaryUsedPercent}%`);
  if (hasNumber(quota.codeReviewUsedPercent)) parts.push(`review ${quota.codeReviewUsedPercent}%`);
  if (checkedAt) parts.push(`checked ${new Date(checkedAt * 1000).toLocaleString()}`);
  return parts.join(" · ") || "quota 已缓存";
}

function routeAuditLabel(a) {
  if (a.provider !== "codex") return "";
  const parts = [];
  if (hasNumber(a.routeScore)) parts.push(`route score ${a.routeScore}`);
  if (a.routeReason) parts.push(a.routeReason);
  return parts.join(" · ");
}

function quotaState(q) {
  if (q && q.quotaState) return q.quotaState;
  if (!q || !q.checkedAt) return "missing";
  return quotaFresh(q) ? "fresh" : "stale";
}

function quotaFresh(q) {
  return !!(q && q.checkedAt && Date.now() - q.checkedAt * 1000 <= QUOTA_FRESH_MS);
}

function accountQuotaState(a) {
  if (a && a.quotaState) return a.quotaState;
  if (a && a.quota && a.quota.quotaState) return a.quota.quotaState;
  if (accountQuotaCheckedAt(a)) return accountQuotaFresh(a) ? "fresh" : "stale";
  return "missing";
}

function accountQuotaFresh(a) {
  if (a && typeof a.quotaFresh === "boolean") return a.quotaFresh;
  return quotaFresh(a && a.quota);
}

function accountQuotaCheckedAt(a) {
  return (a && a.quotaCheckedAt) || (a && a.checkedAt) || (a && a.quota && a.quota.checkedAt) || 0;
}

function accountPrimaryUsedPercent(a) {
  if (a && hasNumber(a.primaryUsedPercent)) return a.primaryUsedPercent;
  return a && a.quota ? a.quota.primaryUsedPercent : undefined;
}

function hasNumber(v) {
  return typeof v === "number" && Number.isFinite(v);
}

function capdWebSocketURL() {
  const u = new URL(`ws://${CAPD}/ws`);
  return u.toString();
}

function webSocketAuthProtocol(token) {
  const bytes = new TextEncoder().encode(token);
  let binary = "";
  for (const b of bytes) binary += String.fromCharCode(b);
  return "capd.auth." + btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function capdHTTPURL(path) {
  const u = new URL(`http://${CAPD}${path}`);
  return u.toString();
}

async function checkDaemonHealth(updateStatus = true) {
  if (updateStatus) statusEl.textContent = "检查 daemon health…";
  const res = await fetch(capdHTTPURL("/healthz?format=json"), { cache: "no-store" });
  const body = (await res.text()).trim();
  if (!res.ok) throw new Error(`CAP health failed: ${res.status} ${body || "empty"}`);
  try {
    const info = JSON.parse(body);
    if (!info.ok) throw new Error("health ok=false");
    lastHealthInfo = info;
    return info;
  } catch (err) {
    if (body !== "ok") throw new Error(`CAP health failed: invalid JSON ${body || "empty"}`);
    lastHealthInfo = { ok: true };
    return lastHealthInfo;
  }
}

async function exportEvidencePackage() {
  const button = document.getElementById("exportEvidencePackage");
  button.disabled = true;
  try {
    const health = await checkDaemonHealth(false).catch(e => ({ ok:false, source:"health", error:e.message || String(e) }));
    let probeData = lastProbeData;
    if (TOKEN) {
      probeData = await fetchProbeData({ readiness: false }).catch(e => ({ ok:false, source:"probe/data", error:e.message || String(e) }));
      lastProbeData = probeData;
    }
    let route = lastRouteDecision;
    if (!route && ws && ws.readyState === WebSocket.OPEN) {
      try {
        route = await call("agents/route", { accountId: "auto" });
        lastRouteDecision = route;
      } catch (e) {
        route = e.data || { ok:false, source:"agents/route", error:e.message || JSON.stringify(e) };
        lastRouteDecision = route;
      }
    }
    const accountsCheck = lastAccountsCheck || (probeData && probeData.accountsCheck) || null;
    const manifest = {
      manifestVersion: 1,
      status: packageStatus(probeData, accountsCheck),
      stage: "web-console-evidence",
      backend: (health && health.secretBackend) || (probeData && probeData.summary && probeData.summary.secretBackend) || "",
      daemonMode: "external",
      checkedAt: Math.floor(Date.now() / 1000),
      artifacts: {
        health: "inline:health.json",
        probeData: "inline:probe-data.json",
        agentsRoute: "inline:agents-route.json",
        accountsCheck: "inline:accounts-check.json"
      }
    };
    const files = {
      "manifest.json": manifest,
      "health.json": health || {},
      "probe-data.json": probeData || {},
      "agents-route.json": route || {},
      "accounts-check.json": accountsCheck || {}
    };
    const pkg = redactEvidence({
      packageVersion: 1,
      kind: "capd-web-console-evidence",
      manifest,
      files
    });
    evidenceManifestInputEl.value = JSON.stringify(pkg.manifest, null, 2);
    evidenceArtifactsInputEl.value = [

      pkg.files["probe-data.json"],
      pkg.files["agents-route.json"],
      pkg.files["accounts-check.json"]
    ].map(v => JSON.stringify(v, null, 2)).join("\n\n");
    renderEvidenceManifest();
    downloadJSON(`capd-web-evidence-${pkg.manifest.checkedAt}.json`, pkg);
    line("ev-done", "✓ Evidence package exported");
  } catch (e) {
    line("ev-err", `✗ Evidence export failed: ${e.message || JSON.stringify(e)}`);
  } finally {
    button.disabled = false;
  }
}

function packageStatus(probeData, accountsCheck) {
  if (probeData && probeData.ok === true) return "passed";
  if (probeData && probeData.ok === false) return "failed";
  if (accountsCheck && accountsCheck.summary && accountsCheck.summary.ready === true) return "passed";
  return "collected";
}

function downloadJSON(name, value) {
  const blob = new Blob([JSON.stringify(value, null, 2) + "\n"], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function redactEvidence(value) {
  const forbiddenKeys = [
    "access" + "Token",
    "refresh" + "Token",
    "id" + "Token",
    "api" + "Key",
    "raw" + "Auth" + "Json",
    "secret" + "Ref",
    "secret" + "_" + "ref",
    "auth" + "Json",
    "codex" + "Home",
    "runtime" + "Root",
    "env"
  ].map(k => k.toLowerCase());
  if (Array.isArray(value)) return value.map(redactEvidence);
  if (value && typeof value === "object") {
    const out = {};
    for (const [key, item] of Object.entries(value)) {
      out[key] = forbiddenKeys.includes(key.toLowerCase()) ? "[redacted]" : redactEvidence(item);
    }
    return out;
  }
  if (typeof value === "string" && TOKEN && value.includes(TOKEN)) return value.split(TOKEN).join("[redacted-token]");
  return value;
}

async function connect() {
  const health = await checkDaemonHealth();
  ws = new WebSocket(capdWebSocketURL(), [webSocketAuthProtocol(TOKEN)]);
  ws.onmessage = (m) => {
    const msg = JSON.parse(m.data);
    if (msg.method === "event") { onEvent(msg.params); return; }
    const p = pending[msg.id];
    if (p) {
      delete pending[msg.id];
      clearTimeout(p.timer);
      msg.error ? p.reject(rpcError(msg.error)) : p.resolve(msg.result);
    }
  };
  ws.onclose = () => {
    statusEl.textContent = "连接断开";
    rejectAllPending("CAP WebSocket closed");
  };
  await new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error("CAP WebSocket connect timeout")), 10000);
    ws.onopen = () => { clearTimeout(timer); resolve(); };
    ws.onerror = () => { clearTimeout(timer); reject(new Error("CAP WebSocket error")); };
  });
  ws.onerror = () => {
    statusEl.textContent = "连接错误";
    rejectAllPending("CAP WebSocket error");
  };

  const init = await call("initialize", { protocolVersion: "0.1", client: { name: "cap-web-demo" } });
  const healthMeta = [
    health.version || (init.daemon && init.daemon.version),
    `protocol ${health.protocolVersion || init.protocolVersion}`,
    health.secretBackend ? `secret ${health.secretBackend}` : ""
  ].filter(Boolean).join(" · ");
  document.getElementById("daemon").textContent = `${(init.daemon && init.daemon.name) || health.daemon || "capd"} ${healthMeta}`;
  statusEl.textContent = "已连接 · health ok";

  const { agents } = await call("agents/list", {});
  const sel = document.getElementById("agent");
  for (const a of agents.filter(a => a.available)) {
    const o = document.createElement("option");
    o.value = a.id; o.textContent = `${a.id} (${a.version || "?"})`;
    sel.appendChild(o);
  }

  await loadAccounts();
  await loadSessions();
}

function renderEvidenceManifest() {
  evidenceManifestResultEl.textContent = "";
  const raw = evidenceManifestInputEl.value.trim();
  if (!raw) {
    renderEvidenceManifestRows([{ name: "manifest", ok: false, evidence: "empty input", nextStep: "paste manifest.json or summary.json from CAPD_LIVE_EVIDENCE_DIR/CAPD_LIVE_SUMMARY" }]);
    return;
  }
  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (e) {
    renderEvidenceManifestRows([{ name: "manifest JSON", ok: false, evidence: e.message || String(e), nextStep: "paste valid JSON from manifest.json or summary.json" }]);
    return;
  }
  const normalized = normalizeEvidenceManifest(parsed);
  const artifacts = parseEvidenceArtifacts(evidenceArtifactsInputEl.value.trim());
  renderEvidenceManifestRows(evidenceManifestRows(normalized).concat(evidenceArtifactRows(artifacts)));
}

function normalizeEvidenceManifest(data) {
  const artifacts = data.artifacts || {};
  if (data.manifestVersion) {
    return {
      source: "manifest.json",
      version: data.manifestVersion,
      status: data.status || "",
      stage: data.stage || "",
      detail: data.detail || "",
      backend: data.backend || "",
      daemonMode: data.daemonMode || "",
      artifacts
    };
  }
  if (data.summaryVersion) {
    return {
      source: "summary.json",
      version: data.summaryVersion,
      status: data.status || "",
      stage: data.stage || "",
      detail: data.detail || "",
      backend: data.backend || "",
      daemonMode: data.daemonMode || "",
      artifacts: {
        manifest: data.evidenceManifestPath || "",
        report: data.evidenceReportPath || "",
        agentsRoute: data.routeEvidencePath || "",
        probeData: data.probeEvidencePath || "",
        doctor: data.doctorEvidencePath || "",
        repairPlan: data.repairPlanPath || ""
      }
    };
  }
  return {
    source: "unknown",
    version: "",
    status: "",
    stage: "",
    detail: "missing manifestVersion or summaryVersion",
    backend: "",
    daemonMode: "",
    artifacts
  };
}

function evidenceManifestRows(manifest) {
  const okStatus = manifest.status === "passed" || manifest.status === "running";
  const rows = [
    {
      name: "diagnostic package",
      ok: !!manifest.version && manifest.source !== "unknown",
      evidence: `${manifest.source} v${manifest.version || "?"}`,
      nextStep: manifest.source === "unknown" ? "paste CAPD live selftest manifest.json or summary.json" : ""
    },
    {
      name: "selftest status",
      ok: okStatus,
      evidence: [manifest.status || "unknown", manifest.stage || "", manifest.detail || ""].filter(Boolean).join(" · "),
      nextStep: okStatus ? "" : "open the listed artifacts and fix the failed account, quota, SecretStore, or route gate"
    },
    {
      name: "SecretStore backend",
      ok: !!manifest.backend,
      evidence: manifest.backend ? `secret ${manifest.backend}` : "missing backend",
      nextStep: manifest.backend ? "" : "rerun live selftest with CAPD_LIVE_SUMMARY and CAPD_LIVE_EVIDENCE_DIR"
    },
    {
      name: "daemon mode",
      ok: !!manifest.daemonMode,
      evidence: manifest.daemonMode || "missing daemon mode",
      nextStep: manifest.daemonMode ? "" : "rerun live selftest so daemon mode is recorded"
    }
  ];
  const artifactNames = [
    ["manifest", "manifest index"],
    ["report", "HTML report"],
    ["health", "daemon health"],
    ["accountsList", "account metadata"],
    ["agentsRoute", "route evidence"],
    ["probeData", "probe evidence"],
    ["doctor", "doctor evidence"],
    ["accountsSmoke", "account smoke"],
    ["accountsCheck", "accounts/check readiness"],
    ["repairPlan", "repair plan"]
  ];
  for (const [key, label] of artifactNames) {
    if (!(key in manifest.artifacts)) continue;
    const path = manifest.artifacts[key] || "";
    rows.push({
      name: label,
      ok: !!path,
      evidence: path || "not captured",
      nextStep: path ? "" : "artifact is optional or was not produced for this selftest path"
    });
  }
  return rows;
}

function parseEvidenceArtifacts(raw) {
  if (!raw) return { values: [], errors: [] };
  const values = [];
  const errors = [];
  try {
    const parsed = JSON.parse(raw);
    return { values: Array.isArray(parsed) ? parsed : [parsed], errors };
  } catch (_) {}
  const chunks = raw.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
  for (const [index, chunk] of chunks.entries()) {
    try {
      const parsed = JSON.parse(chunk);
      if (Array.isArray(parsed)) values.push(...parsed);
      else values.push(parsed);
    } catch (e) {
      errors.push(`artifact ${index + 1}: ${e.message || String(e)}`);
    }
  }
  return { values, errors };
}

function evidenceArtifactRows(parsed) {
  const rows = [];
  for (const err of parsed.errors) {
    rows.push({ name: "artifact JSON", ok: false, evidence: err, nextStep: "paste valid JSON objects separated by blank lines" });
  }
  if (parsed.values.length === 0) {
    rows.push({ name: "artifact details", ok: true, evidence: "no artifact JSON pasted", nextStep: "paste route/probe/doctor JSON for deeper QA evidence" });
    return rows;
  }
  const routeLike = parsed.values.find(v => v && (v.routePolicy || v.routeCandidates || v.accountRoute));
  const probeLike = parsed.values.find(v => v && (v.summary || v.checks || v.repairPlan));
  const doctorLike = parsed.values.find(v => v && (v.codex || v.repairPlan || v.issues));
  const policy = firstValue(parsed.values, v => v && (v.routePolicy || (v.codex && v.codex.routePolicy) || (v.data && v.data.routePolicy)));
  const candidates = firstValue(parsed.values, v => v && (v.routeCandidates || (v.data && v.data.routeCandidates) || (v.codex && v.codex.routeCandidates)));
  const summary = firstValue(parsed.values, v => v && (v.summary || (v.data && v.data.summary)));
  const routeDecision = firstValue(parsed.values, v => v && (v.accountRoute || v.routeDecision || (v.data && (v.data.accountRoute || v.data.routeDecision)) || (v.codex && (v.codex.accountRoute || v.codex.routeDecision))));
  const repairPlan = firstValue(parsed.values, v => v && (v.repairPlan || (v.data && v.data.repairPlan) || (v.codex && v.codex.repairPlan)));
  rows.push({
    name: "artifact coverage",
    ok: !!(routeLike || probeLike || doctorLike),
    evidence: [
      routeLike ? "route" : "",
      probeLike ? "probe" : "",
      doctorLike ? "doctor" : ""
    ].filter(Boolean).join(" · ") || "no recognized artifact shape",
    nextStep: routeLike || probeLike || doctorLike ? "" : "paste agents-route.json, probe-data-readiness.json, or doctor-prompt-free.json"
  });
  rows.push({
    name: "route policy evidence",
    ok: !!policy,
    evidence: policy ? routePolicySummary(policy) : "missing routePolicy",
    nextStep: policy ? "" : "paste route/probe/doctor JSON that includes routePolicy"
  });
  rows.push({
    name: "route candidate evidence",
    ok: Array.isArray(candidates) && candidates.length > 0,
    evidence: Array.isArray(candidates) && candidates.length > 0 ? routeCandidateSummary(candidates) : "missing routeCandidates",
    nextStep: Array.isArray(candidates) && candidates.length > 0 ? "" : "paste agents-route.json or probe data with routeCandidates"
  });
  rows.push({
    name: "route decision evidence",
    ok: routeDecisionEvidenceOK(summary, routeDecision),
    evidence: routeDecisionEvidenceText(summary, routeDecision),
    nextStep: routeDecisionEvidenceOK(summary, routeDecision) ? "" : "paste agents-route.json with accountRoute or probe data with summary.routeDecisionOk=true"
  });
  rows.push({
    name: "quota freshness evidence",
    ok: quotaEvidenceOK(summary, candidates),
    evidence: quotaEvidenceText(summary, candidates),
    nextStep: quotaEvidenceOK(summary, candidates) ? "" : "refresh quota and rerun live selftest or paste fresh probe data"
  });
  rows.push({
    name: "repair plan evidence",
    ok: Array.isArray(repairPlan),
    evidence: Array.isArray(repairPlan) ? `${repairPlan.length} steps` : "missing repairPlan",
    nextStep: Array.isArray(repairPlan) ? "" : "paste probe or doctor JSON to see runnable remediation evidence"
  });
  return rows;
}

function firstValue(values, picker) {
  for (const value of values) {
    const picked = picker(value);
    if (picked) return picked;
  }
  return null;
}

function routeDecisionEvidenceOK(summary, routeDecision) {
  if (summary && typeof summary.routeDecisionOk === "boolean") return summary.routeDecisionOk;
  return !!routeDecision;
}

function routeDecisionEvidenceText(summary, routeDecision) {
  if (summary && typeof summary.routeDecisionOk === "boolean") return `routeDecisionOk ${summary.routeDecisionOk}`;
  if (routeDecision) return routeDecisionSummary(routeDecision);
  return "missing routeDecisionOk";
}

function quotaEvidenceOK(summary, candidates) {
  if (summary && summary.checkedAccounts > 0 && summary.freshQuotaAccounts === summary.checkedAccounts && summary.autoRouteFresh) return true;
  return Array.isArray(candidates) && candidates.length > 0 && candidates.every(c => c && c.fresh);
}

function quotaEvidenceText(summary, candidates) {
  if (summary) {
    return `accounts ${summary.checkedAccounts || 0} fresh ${summary.freshQuotaAccounts || 0} stale ${summary.staleQuotaAccounts || 0} missing ${summary.missingQuotaAccounts || 0} autoFresh ${!!summary.autoRouteFresh}`;
  }
  if (Array.isArray(candidates) && candidates.length > 0) {
    const fresh = candidates.filter(c => c && c.fresh).length;
    return `fresh candidates ${fresh}/${candidates.length}`;
  }
  return "missing quota summary";
}

function renderEvidenceManifestRows(rows) {
  evidenceManifestResultEl.textContent = "";
  for (const row of rows) {
    const box = document.createElement("div");
    box.className = "check " + (row.ok ? "pass" : "fail");
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = `${row.ok ? "pass" : "fail"} · ${row.name}`;
    const evidence = document.createElement("div");
    evidence.className = "evidence";
    evidence.textContent = row.evidence || "";
    box.append(name, evidence);
    if (row.nextStep) {
      const next = document.createElement("div");
      next.className = "next";
      next.textContent = row.nextStep;
      box.appendChild(next);
    }
    evidenceManifestResultEl.appendChild(box);
  }
}

document.getElementById("send").onclick = async () => {
  try {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) return;
    document.getElementById("prompt").value = "";
    if (!sessionId) {
      const cwd = document.getElementById("cwd").value.trim();
      const accountId = document.getElementById("account").value;
      const profile = accountId === "auto" ? accountProfileName() : "";
      const create = { agentId: document.getElementById("agent").value, cwd };
      if (accountId) create.accountId = accountId;
      if (profile) create.profile = profile;
      if (accountId === "auto" && document.getElementById("requireFreshQuota").checked) create.requireFreshQuota = true;
      const res = await call("session/create", create);
      sessionId = res.sessionId;
      const accountEvidence = res.accountId ? ` · account ${res.accountId}` : "";
      line("ev-sys", `· 新会话 ${sessionId}${accountEvidence} @ ${cwd || "~"}`);
      await loadSessions();
    }
    line("ev-sys", `» ${prompt}`);
    await call("task/send", { sessionId, prompt });
  } catch (e) {
    line("ev-err", `✗ 发送失败: ${e.message || JSON.stringify(e)}`);
  }
};
document.getElementById("cancel").onclick = () => sessionId && call("task/cancel", { sessionId });
document.getElementById("refreshSessions").onclick = loadSessions;
document.getElementById("previewRoute").onclick = previewRoute;
document.getElementById("refreshDiagnostic").onclick = refreshReadinessDiagnostic;
document.getElementById("deepVerify").onclick = deepVerify;
document.getElementById("importCodex").onclick = importCodexAccount;
document.getElementById("checkAccounts").onclick = () => checkAccounts(false);
document.getElementById("checkReady").onclick = () => checkAccounts(true);
document.getElementById("refreshSelectedQuota").onclick = refreshSelectedQuota;
document.getElementById("refreshAllQuota").onclick = refreshAllQuota;
document.getElementById("renderEvidenceManifest").onclick = renderEvidenceManifest;
document.getElementById("exportEvidencePackage").onclick = exportEvidencePackage;
document.getElementById("refreshProfiles").onclick = () => loadProfiles(accountProfileName()).catch(e => line("ev-err", `✗ profile 刷新失败: ${e.message || JSON.stringify(e)}`));
document.getElementById("saveProfile").onclick = () => saveProfile(false).catch(e => line("ev-err", `✗ profile 保存失败: ${e.message || JSON.stringify(e)}`));
document.getElementById("setCurrentProfile").onclick = () => saveProfile(true).catch(e => line("ev-err", `✗ profile 当前设置失败: ${e.message || JSON.stringify(e)}`));
document.getElementById("addProfileMember").onclick = () => updateProfileMember(true).catch(e => line("ev-err", `✗ profile 加入失败: ${e.message || JSON.stringify(e)}`));
document.getElementById("removeProfileMember").onclick = () => updateProfileMember(false).catch(e => line("ev-err", `✗ profile 移除失败: ${e.message || JSON.stringify(e)}`));
document.getElementById("deleteProfile").onclick = () => deleteProfile().catch(e => line("ev-err", `✗ profile 删除失败: ${e.message || JSON.stringify(e)}`));
document.getElementById("clearEvidenceManifest").onclick = () => {
  evidenceManifestInputEl.value = "";
  evidenceArtifactsInputEl.value = "";
  evidenceManifestResultEl.textContent = "";
};
document.getElementById("account").onchange = () => { markActiveAccount(); updateProfileControl(); previewRoute(); };
document.getElementById("accountProfile").oninput = previewRoute;
document.getElementById("requireFreshQuota").onchange = previewRoute;
document.getElementById("prompt").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("send").click(); });

if (REQUIRED_SECRET_BACKEND) document.getElementById("requireNativeSecret").checked = REQUIRED_SECRET_BACKEND === "native";
connect().catch(e => { statusEl.textContent = "连接失败: " + (e.message || JSON.stringify(e)); });
</script>
