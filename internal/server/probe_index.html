<!doctype html>
<meta charset="utf-8">
<title>CAPD Probe</title>
<style>
  :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#0d1117; color:#e6edf3; }
  body { margin:0; padding:20px; }
  main { max-width:1080px; margin:0 auto; display:grid; gap:14px; }
  header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  h1 { margin:0; font-size:22px; font-weight:650; }
  button { background:#238636; color:white; border:0; border-radius:6px; padding:8px 12px; font-weight:650; cursor:pointer; }
  button.secondary { background:#30363d; }
  button:disabled { opacity:.55; cursor:not-allowed; }
  label { display:flex; align-items:center; gap:8px; color:#c9d1d9; font-size:13px; }
  .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:10px; }
  .metric { border:1px solid #30363d; border-radius:8px; padding:12px; background:#161b22; min-height:74px; }
  .label { color:#8b949e; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .value { margin-top:8px; font-size:18px; font-weight:650; overflow-wrap:anywhere; }
  .ok { color:#3fb950; }
  .warn { color:#d29922; }
  .bad { color:#f85149; }
  .panel { border:1px solid #30363d; border-radius:8px; background:#0d1117; overflow:hidden; }
  .panel h2 { margin:0; padding:10px 12px; border-bottom:1px solid #30363d; font-size:14px; background:#161b22; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:8px 10px; border-bottom:1px solid #30363d; text-align:left; vertical-align:top; }
  th { color:#8b949e; font-weight:650; background:#161b22; }
  td:nth-child(2) { font-weight:650; width:92px; }
  pre { margin:0; padding:12px; overflow:auto; min-height:96px; font:12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space:pre-wrap; }
</style>
<main>
  <header>
    <h1>CAPD Probe</h1>
    <div class="toolbar">
      <label><input id="native" type="checkbox" checked> native secret</label>
      <button id="refresh">Refresh</button>
      <button id="readiness" class="secondary">Readiness</button>
    </div>
  </header>
  <section class="grid">
    <div class="metric"><div class="label">daemon</div><div id="daemon" class="value warn">waiting</div></div>
    <div class="metric"><div class="label">codex accounts</div><div id="accounts" class="value warn">waiting</div></div>
    <div class="metric"><div class="label">quota fresh</div><div id="quota" class="value warn">waiting</div></div>
    <div class="metric"><div class="label">auto route</div><div id="route" class="value warn">waiting</div></div>
  </section>
  <section class="panel">
    <h2>Summary</h2>
    <pre id="summary">waiting</pre>
  </section>
  <section class="panel">
    <h2>Validation Tests</h2>
    <table>
      <thead><tr><th>Check</th><th>Status</th><th>Evidence</th><th>Next step</th></tr></thead>
      <tbody id="tests"><tr><td>probe</td><td class="warn">waiting</td><td>not run yet</td></tr></tbody>
    </table>
  </section>
  <section class="panel">
    <h2>Evidence JSON</h2>
    <pre id="json">{}</pre>
  </section>
</main>
<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get("token") || "";
const REQUIRED_SECRET_BACKEND = normalizeSecretBackend(params.get("requireSecretBackend") || "");
if (TOKEN) {
  params.delete("token");
  history.replaceState(null, "", location.pathname + (params.toString() ? "?" + params.toString() : ""));
}
const state = { ws: null, id: 0, pending: {} };
const $ = id => document.getElementById(id);
const setMetric = (id, text, cls) => { const el = $(id); el.textContent = text; el.className = "value " + cls; };
function capdHost() { return location.host || "127.0.0.1:7777"; }
function httpURL(path) { return `${location.protocol === "https:" ? "https" : "http"}://${capdHost()}${path}`; }
function wsURL() { return `${location.protocol === "https:" ? "wss" : "ws"}://${capdHost()}/ws`; }
function webSocketAuthProtocol(token) {
  const bytes = new TextEncoder().encode(token);
  let binary = "";
  for (const b of bytes) binary += String.fromCharCode(b);
  return "capd.auth." + btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function showJSON(data) { $("json").textContent = JSON.stringify(data, null, 2); }
function showSummary(lines) { $("summary").textContent = lines.join("\n"); }
function normalizeSecretBackend(value) {
  value = String(value || "").trim();
  return value === "file" || value === "native" ? value : "";
}
function requiredSecretBackend() {
  return REQUIRED_SECRET_BACKEND || ($("native").checked ? "native" : "");
}
async function fetchProbeData(readiness) {
  if (!TOKEN) throw new Error("token missing");
  const query = new URLSearchParams();
  if (readiness) query.set("readiness", "1");
  const requiredBackend = requiredSecretBackend();
  if (requiredBackend) query.set("requireSecretBackend", requiredBackend);
  const res = await fetch(httpURL("/probe/data" + (query.toString() ? "?" + query.toString() : "")), {
    cache:"no-store",
    headers:{ Authorization:`Bearer ${TOKEN}` }
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok && !body.errors) throw new Error(`probe data failed: ${res.status}`);
  return body;
}
function rpcError(error) {
  const e = new Error(error.message || JSON.stringify(error));
  e.data = error.data;
  return e;
}
function showTests(rows) {
  const tbody = $("tests");
  tbody.textContent = "";
  for (const row of rows) {
    const tr = document.createElement("tr");
    const name = document.createElement("td");
    const status = document.createElement("td");
    const evidence = document.createElement("td");
    const nextStep = document.createElement("td");
    name.textContent = row.name;
    status.textContent = row.ok ? "pass" : "fail";
    status.className = row.ok ? "ok" : "bad";
    evidence.textContent = row.evidence || "";
    nextStep.textContent = row.nextStep || "";
    tr.append(name, status, evidence, nextStep);
    tbody.appendChild(tr);
  }
}
const RPC_TIMEOUT_MS = 12000;
const LONG_RPC_TIMEOUT_MS = 120000;

function rpcTimeoutFor(method, params = {}) {
  if (method === "accounts/quota" || method === "agents/usage") return LONG_RPC_TIMEOUT_MS;
  if (method === "accounts/check" && (params.refreshQuota || params.requireFreshQuota || params.requireAllFreshQuota || params.requireMultiple)) return LONG_RPC_TIMEOUT_MS;
  return RPC_TIMEOUT_MS;
}

async function call(method, params = {}) {
  if (!state.ws || state.ws.readyState !== WebSocket.OPEN) throw new Error("CAP WebSocket is not connected");
  const id = ++state.id;
  state.ws.send(JSON.stringify({ jsonrpc:"2.0", id, method, params }));
  return new Promise((resolve, reject) => {
    const timeoutMS = rpcTimeoutFor(method, params);
    const timer = setTimeout(() => {
      if (state.pending[id]) {
        delete state.pending[id];
        reject(new Error(`${method} timeout after ${timeoutMS}ms`));
      }
    }, timeoutMS);
    state.pending[id] = { resolve, reject, timer };
  });
}
async function connect() {
  if (!TOKEN) throw new Error("token missing");
  if (state.ws && state.ws.readyState === WebSocket.OPEN) return;
  state.ws = new WebSocket(wsURL(), [webSocketAuthProtocol(TOKEN)]);
  state.ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.id && state.pending[msg.id]) {
      const pending = state.pending[msg.id];
      delete state.pending[msg.id];
      clearTimeout(pending.timer);
      msg.error ? pending.reject(rpcError(msg.error)) : pending.resolve(msg.result);
    }
  };
  await new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error("connect timeout")), 4000);
    state.ws.onopen = () => { clearTimeout(timer); resolve(); };
    state.ws.onerror = () => { clearTimeout(timer); reject(new Error("connect failed")); };
  });
}
function accountEvidence(accounts) {
  return accounts.map(a => {
    const bits = [a.id, a.quotaState || "missing"];
    if (typeof a.quotaFresh === "boolean") bits.push(a.quotaFresh ? "fresh" : "not-fresh");
    if (typeof a.primaryUsedPercent === "number") bits.push(`primary ${a.primaryUsedPercent}%`);
    return bits.join(" ");
  });
}
function routeText(route) {
  if (!route) return "missing";
  const bits = [route.accountId || "unknown", route.quotaState || "missing"];
  bits.push(route.fresh ? "fresh" : "not-fresh");
  if (typeof route.primaryUsedPercent === "number") bits.push(`primary ${route.primaryUsedPercent}%`);
  return bits.join(" ");
}
function routeDecisionText(decision, route) {
  if (!decision) return routeText(route);
  const bits = [];
  if (decision.agent && decision.agent.id) bits.push(`agent ${decision.agent.id}`);
  if (decision.accountId) bits.push(`account ${decision.accountId}`);
  if (route) bits.push(routeText(route));
  const candidates = routeCandidateText(decision.routeCandidates);
  if (candidates) bits.push(`candidates ${candidates}`);
  if (decision.reason) bits.push(decision.reason);
  return bits.join(" · ") || routeText(route);
}
function routeCandidateText(candidates) {
  if (!Array.isArray(candidates) || candidates.length === 0) return "";
  return candidates.map(c => routeText(c)).join(" | ");
}
function readinessSummaryText(summary) {
  if (!summary) return "";
  const bits = [
    `ready ${!!summary.ready}`,
    `accounts ${summary.checkedAccounts || 0}/${summary.requiredAccounts || 2}`,
    `missing ${summary.missingAccounts || 0}`,
    `quota fresh ${summary.freshQuotaAccounts || 0}`,
    `stale ${summary.staleQuotaAccounts || 0}`,
    `missing quota ${summary.missingQuotaAccounts || 0}`,
    `auto fresh ${!!summary.autoRouteFresh}`,
    `route decision ${!!summary.routeDecisionOk}`,
    `secret ok ${!!summary.secretBackendOk}`
  ];
  if (summary.autoRouteAccountId) bits.push(`auto ${summary.autoRouteAccountId}`);
  if (summary.secretBackend) bits.push(`secret ${summary.secretBackend}`);
  return bits.join(" · ");
}
async function fetchHealthInfo() {
  const health = await fetch(httpURL("/healthz?format=json"), { cache:"no-store" });
  const body = (await health.text()).trim();
  if (!health.ok) throw new Error(`healthz failed: ${health.status} ${body || "empty"}`);
  try {
    const info = JSON.parse(body);
    if (!info.ok) throw new Error("health ok=false");
    return info;
  } catch (err) {
    if (body !== "ok") throw new Error(`healthz invalid JSON: ${body || "empty"}`);
    return { ok:true };
  }
}
function healthEvidence(info) {
  if (!info) return "/healthz unavailable";
  const bits = ["/healthz ok"];
  if (info.version) bits.push(`version ${info.version}`);
  if (info.protocolVersion) bits.push(`protocol ${info.protocolVersion}`);
  if (info.secretBackend) bits.push(`secret ${info.secretBackend}`);
  return bits.join(" · ");
}
function validationRows({ healthOK, result, route, routeDecision, readiness, requireNative, readinessError, routeError }) {
  const accounts = result && result.accounts ? result.accounts : [];
  const fresh = accounts.filter(a => a.quotaFresh).length;
  const readable = accounts.filter(a => a.credentialReadable).length;
  const secretBackendOK = accounts.filter(a => a.secretBackendOk).length;
  const runtimeReady = accounts.filter(a => a.runtimeReady).length;
  const authPrivate = accounts.filter(a => a.authJsonPrivate).length;
  const markerOK = accounts.filter(a => a.projectionMarkerOk).length;
  const secretBackend = result && result.secretBackend ? result.secretBackend : "unknown";
  const secretStates = accounts.map(a => a.secretState).filter(Boolean).join(", ") || "unknown";
  const routeEvidence = routeText(route);
  const candidatesEvidence = routeCandidateText((routeDecision && routeDecision.routeCandidates) || (result && result.routeCandidates));
  const nativeSecretOK = !readiness || !requireNative || secretBackend === "native";
  const nativeSecretNextStep = !readiness || !requireNative ? "" : (secretBackend === "native" ? "deep verify with: capd doctor --json --fail --verify-secretstore --require-secret-backend native" : "restart daemon with: capd start --secret-backend native");
  const rows = [
    { name:"daemon health", ok:!!healthOK, evidence:healthEvidence(healthOK), nextStep:healthOK ? "" : "start capd with: capd start" },
    { name:"accounts/check data", ok:!!result, evidence:result ? `${result.checkedAccounts || 0} account(s), secret ${secretBackend}, secretState ${secretStates}` : "accounts/check failed", nextStep:result ? "" : "check daemon logs and retry accounts/check" },
    { name:"account credentials", ok:accounts.length > 0 && readable === accounts.length && secretBackendOK === accounts.length, evidence:`readable ${readable}/${accounts.length}, backend ${secretBackendOK}/${accounts.length}`, nextStep:(accounts.length > 0 && readable === accounts.length && secretBackendOK === accounts.length) ? "" : "fix SecretStore access or re-import failing accounts" },
    { name:"account runtime", ok:accounts.length > 0 && runtimeReady === accounts.length, evidence:`runtime ${runtimeReady}/${accounts.length}, auth ${authPrivate}/${accounts.length}, marker ${markerOK}/${accounts.length}`, nextStep:(accounts.length > 0 && runtimeReady === accounts.length) ? "" : "project account runtimes with accounts/project or rerun accounts/check" },
    { name:"multi-account readiness", ok:(result && (result.checkedAccounts || 0) >= 2), evidence:`checked ${result ? result.checkedAccounts || 0 : 0}, need 2`, nextStep:(result && (result.checkedAccounts || 0) >= 2) ? "" : "import at least two accounts with: capd accounts import --auth /path/a --auth /path/b" },
    { name:"quota freshness", ok:accounts.length > 0 && fresh === accounts.length, evidence:`fresh ${fresh}/${accounts.length}`, nextStep:(accounts.length > 0 && fresh === accounts.length) ? "" : "refresh and verify with: capd accounts check --readiness" },
    { name:"auto route data", ok:!!route, evidence:routeEvidence, nextStep:route ? "" : "import accounts, then refresh quota with: capd accounts check --readiness" },
    { name:"auto route fresh", ok:!!(route && route.fresh), evidence:routeEvidence, nextStep:(route && route.fresh) ? "" : "refresh quota and route with: capd accounts check --readiness" },
    { name:"route decision", ok:!!routeDecision, evidence:routeDecisionText(routeDecision, route), nextStep:routeDecision ? "" : "preview routing with: capd agents route --account auto" },
    { name:"route candidates", ok:!!candidatesEvidence, evidence:candidatesEvidence || "routeCandidates missing", nextStep:candidatesEvidence ? "" : "preview routing with: capd agents route --account auto --json" },
    { name:"native secret backend", ok:nativeSecretOK, evidence:requireNative ? `secret ${secretBackend}` : "not required", nextStep:nativeSecretNextStep },
  ];
  if (readiness) rows.push({ name:"readiness gate", ok:!readinessError && !routeError && rows.every(r => r.name === "readiness gate" || r.ok), evidence:readinessError || routeError || "all readiness checks passed", nextStep:(readinessError || routeError) ? "fix failed checks above, then rerun Readiness" : "" });
  if (readinessError) rows.push({ name:"readiness error detail", ok:false, evidence:readinessError, nextStep:"fix readiness gate inputs, then rerun Readiness" });
  if (routeError) rows.push({ name:"route error detail", ok:false, evidence:routeError, nextStep:"fix account routing inputs, then rerun Refresh" });
  return rows;
}
async function refresh(readiness = false) {
  $("refresh").disabled = true;
  $("readiness").disabled = true;
  let healthInfo = null;
  let daemonLabel = "";
  try {
    healthInfo = await fetchHealthInfo();
    daemonLabel = [healthInfo.version, healthInfo.protocolVersion ? `p ${healthInfo.protocolVersion}` : "", healthInfo.secretBackend ? `secret ${healthInfo.secretBackend}` : ""].filter(Boolean).join(" · ");
    setMetric("daemon", daemonLabel || "ok", "ok");
    await connect();
    await call("initialize", { protocolVersion:"0.1", client:{ name:"capd-probe" } });
    const checkParams = readiness ? {
      provider:"codex",
      refreshQuota:true,
      requireMultiple:true,
      requireFreshQuota:true,
      requireAllFreshQuota:true,
      requireSecretBackend:requiredSecretBackend()
    } : { provider:"codex" };
    let result;
    let readinessError = "";
    try {
      result = await call("accounts/check", checkParams);
    } catch (e) {
      if (!readiness) throw e;
      readinessError = e.message || String(e);
      result = e.data || await call("accounts/check", { provider:"codex" });
    }
    let route = result.autoRoute || null;
    let routeDecision = null;
    let routeError = "";
    try {
      const routed = await call("agents/route", { accountId:"auto", requireFreshQuota:readiness });
      routeDecision = routed;
      route = routed.accountRoute || route;
    } catch (e) {
      routeError = e.message || String(e);
    }
    const accounts = result.accounts || [];
    const fresh = accounts.filter(a => a.quotaFresh).length;
    setMetric("accounts", String(result.checkedAccounts || 0), (result.checkedAccounts || 0) >= 2 ? "ok" : "warn");
    setMetric("quota", `${fresh}/${accounts.length}`, accounts.length && fresh === accounts.length ? "ok" : "warn");
    setMetric("route", routeText(route), route && route.fresh ? "ok" : "warn");
    const summary = [
      `daemon: ${daemonLabel || "ok"}`,
      `secret backend: ${result.secretBackend || healthInfo.secretBackend || "unknown"}`,
      `quota refreshed: ${!!result.quotaRefreshed}`,
      `auto route: ${routeText(route)}`,
      `route decision: ${routeDecisionText(routeDecision, route)}`,
      `route candidates: ${routeCandidateText((routeDecision && routeDecision.routeCandidates) || result.routeCandidates) || "missing"}`,
      ...accountEvidence(accounts)
    ];
    if (readinessError) summary.push(`readiness error: ${readinessError}`);
    if (routeError) summary.push(`route error: ${routeError}`);
    let httpProbe = null;
    try {
      httpProbe = await fetchProbeData(readiness);
      summary.push(`http probe: ${httpProbe.ok ? "ok" : "attention"} (${(httpProbe.checks || []).length} checks)`);
      const httpSummary = readinessSummaryText(httpProbe.summary);
      if (httpSummary) summary.push(`http summary: ${httpSummary}`);
    } catch (probeErr) {
      summary.push(`http probe error: ${probeErr.message || String(probeErr)}`);
    }
    const checks = validationRows({ healthOK:healthInfo, result, route, routeDecision, readiness, requireNative:requiredSecretBackend() === "native", readinessError, routeError });
    showSummary(summary);
    showTests(checks);
    showJSON({ checks, health: healthInfo, accountsCheck: result, routeDecision, autoRoute: route, routeCandidates: (routeDecision && routeDecision.routeCandidates) || result.routeCandidates, httpProbe, readinessError, routeError });
  } catch (e) {
    if (healthInfo) {
      setMetric("daemon", daemonLabel || "ok", "ok");
    } else {
      setMetric("daemon", "attention", "bad");
    }
    let httpProbe = null;
    try {
      httpProbe = await fetchProbeData(readiness);
    } catch (probeErr) {
      httpProbe = { error: probeErr.message || String(probeErr) };
    }
    const fallbackResult = httpProbe && httpProbe.accountsCheck ? httpProbe.accountsCheck : null;
    const fallbackRoute = httpProbe && httpProbe.autoRoute ? httpProbe.autoRoute : null;
    const fallbackRouteDecision = httpProbe && httpProbe.routeDecision ? httpProbe.routeDecision : null;
    const fallbackHealth = (httpProbe && httpProbe.health) || healthInfo;
    if (fallbackResult) {
      const summary = httpProbe.summary || {};
      setMetric("accounts", String(summary.checkedAccounts || fallbackResult.checkedAccounts || 0), (summary.checkedAccounts || fallbackResult.checkedAccounts || 0) >= 2 ? "ok" : "warn");
      setMetric("quota", `${summary.freshQuotaAccounts || 0}/${summary.checkedAccounts || fallbackResult.checkedAccounts || 0}`, summary.checkedAccounts && summary.freshQuotaAccounts === summary.checkedAccounts ? "ok" : "warn");
      setMetric("route", routeText(fallbackRoute), fallbackRoute && fallbackRoute.fresh ? "ok" : "warn");
    }
    const fallbackChecks = httpProbe && Array.isArray(httpProbe.checks) && httpProbe.checks.length
      ? httpProbe.checks
      : validationRows({ healthOK:fallbackHealth, result:fallbackResult, route:fallbackRoute, routeDecision:fallbackRouteDecision, readiness, requireNative:requiredSecretBackend() === "native", readinessError:e.message || String(e), routeError:"" });
    const summaryLines = [
      `error: ${e.message || String(e)}`,
      `daemon: ${healthInfo ? daemonLabel || "ok" : "attention"}`,
    ];
    if (httpProbe && httpProbe.error) {
      summaryLines.push(`http probe error: ${httpProbe.error}`);
    } else if (httpProbe) {
      summaryLines.push(`http probe: ${httpProbe.ok ? "ok" : "attention"} (${(httpProbe.checks || []).length} checks)`);
      const httpSummary = readinessSummaryText(httpProbe.summary);
      if (httpSummary) summaryLines.push(`http summary: ${httpSummary}`);
      if (httpProbe.errors && httpProbe.errors.length) summaryLines.push(...httpProbe.errors.map(err => `${err.source}: ${err.message || err.code || "error"}`));
    }
    showSummary(summaryLines);
    const checks = fallbackChecks;
    showTests(checks);
    showJSON({ checks, health: fallbackHealth, accountsCheck: fallbackResult, routeDecision: fallbackRouteDecision, autoRoute: fallbackRoute, httpProbe, error: e.message || String(e) });
  } finally {
    $("refresh").disabled = false;
    $("readiness").disabled = false;
  }
}
$("refresh").onclick = () => refresh(false);
$("readiness").onclick = () => refresh(true);
if (REQUIRED_SECRET_BACKEND) $("native").checked = REQUIRED_SECRET_BACKEND === "native";
refresh(false);
</script>
